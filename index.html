      :root,

        --text-xs: 0.78rem;
        --text-sm: 0.9rem;
        --text-base: 1rem;
        --text-lg: 1.2rem;
        --text-xl: 1.5rem;
        --space-1: 0.25rem;
        --space-2: 0.4rem;
        --space-3: 0.6rem;
        --space-4: 0.8rem;
        --space-5: 1rem;
        --space-6: 1.2rem;
        --space-8: 1.6rem;
        --space-10: 2rem;
        --color-bg: #f7f4ef;
        --color-surface: #fcfaf7;
        --color-surface-2: #f3eee7;
        --color-border: #ddd4c8;
        --color-divider: #e8e1d8;
        --color-text: #2f261e;
        --color-text-muted: #776e64;
        --color-text-faint: #a8a096;
        --color-text-inverse: #faf8f3;
        --color-primary: #6f1d1b;
        --color-primary-hover: #571614;
        --color-primary-highlight: #ead8d0;
        --shadow-sm: 0 1px 2px rgba(47, 38, 30, 0.06);
        --radius-sm: 0.4rem;
        --radius-md: 0.7rem;
        --radius-lg: 1rem;
        --radius-full: 9999px;
        --font-body: "Satoshi", "Apple SD Gothic Neo", "Noto Sans KR",
          system-ui, sans-serif;
      }
      [data-theme="dark"] {
        --color-bg: #171311;
        --color-surface: #1e1917;
        --color-surface-2: #261f1b;
        --color-border: #3b332d;
        --color-divider: #2b2420;
        --color-text: #ebe4dc;
        --color-text-muted: #b2a79b;
        --color-text-faint: #7f7469;
        --color-text-inverse: #171311;
        --color-primary: #c07363;
        --color-primary-hover: #d28978;
        --color-primary-highlight: #35231e;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.25);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100dvh;
        font-family: var(--font-body);
        font-size: var(--text-base);
        line-height: 1.5;
        color: var(--color-text);
        background: linear-gradient(
          180deg,
          var(--color-bg),
          var(--color-surface-2)
        );
      }
      button,
      input,
      textarea,
      select {
        font: inherit;
        color: inherit;
      }
      button {
        cursor: pointer;
        border: none;
        background: none;
      }
      textarea {
        resize: vertical;
        min-height: 80px;
      }

      .app {
  max-width: 100%;                               /* 화면 전체 */
  margin: 0 auto;
  padding: var(--space-5) var(--space-3) var(--space-6);  /* 좌우 패딩만 살짝 */
  text-align: left;                              /* 안쪽 기본 왼쪽 정렬 */
}

      .header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
      }
      .title-block {
        display: grid;
        gap: var(--space-2);
      }
      .eyebrow {
        font-size: var(--text-xs);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--color-text-muted);
      }
      h1 {
        font-size: var(--text-xl);
      }
      .subtitle {
        font-size: var(--text-sm);
        color: var(--color-text-muted);
      }
      .actions {
        display: flex;
        gap: var(--space-2);
        align-items: center;
      }
      .chip-btn,
      .primary-btn {
        padding: 0.4rem 0.9rem;
        border-radius: var(--radius-full);
        border: 1px solid var(--color-border);
        background: var(--color-surface);
        font-size: var(--text-xs);
      }
      .primary-btn {
        background: var(--color-primary);
        color: var(--color-text-inverse);
        border-color: var(--color-primary);
      }

      .tabs {
        display: flex;
        gap: var(--space-2);
        margin-bottom: var(--space-4);
      }
      .tab-btn {
        flex: 1;
        padding: 0.5rem;
        border-radius: var(--radius-full);
        font-size: var(--text-sm);
        border: 1px solid transparent;
        background: var(--color-surface-2);
      }
      .tab-btn.active {
        background: var(--color-primary);
        color: var(--color-text-inverse);
      }

      .section-caption {
        font-size: var(--text-xs);
        color: var(--color-text-muted);
        margin-bottom: var(--space-3);
      }

      /* 리스트 / 카드 좌측 정렬 */
      .wine-list {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
        align-items: stretch; /* 카드들이 컨테이너 폭에 맞게 늘어나도록 */
      }

      .wine-card {
        border-radius: var(--radius-md);
        border: 1px solid var(--color-border);
        background: var(--color-surface);
        box-shadow: var(--shadow-sm);
        width: 100%; /* 항상 왼쪽부터 꽉 차게 */
      }

      .wine-header {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: var(--space-4) var(--space-4);
      }
      .wine-main {
        display: grid;
        gap: 0.2rem;
      }
      .wine-name {
        font-size: var(--text-sm);
        font-weight: 700;
      }
      .wine-meta {
        font-size: var(--text-xs);
        color: var(--color-text-muted);
      }
      .pill {
        font-size: var(--text-xs);
        padding: 0.15rem 0.55rem;
        border-radius: var(--radius-full);
        background: var(--color-surface-2);
        color: var(--color-text-muted);
        border: 1px solid var(--color-divider);
      }
      .chevron {
        font-size: 0.9rem;
        color: var(--color-text-faint);
        margin-left: 0.25rem;
      }

      .wine-body {
        display: none;
        border-top: 1px solid var(--color-divider);
        padding: var(--space-3) var(--space-4) var(--space-4);
      }
      .wine-card.expanded .wine-body {
        display: block;
      }

      .wine-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
        gap: var(--space-3);
      }
      .fact-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--space-2);
      }
      .fact {
        background: var(--color-surface-2);
        border-radius: var(--radius-sm);
        padding: var(--space-3);
        border: 1px solid var(--color-divider);
        font-size: var(--text-xs);
      }
      .fact label {
        display: block;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-text-muted);
        margin-bottom: 0.15rem;
      }
      .bullet-list {
        margin-top: var(--space-3);
        list-style: none;
        padding-left: 0;
        font-size: var(--text-xs);
      }
      .bullet-list li {
        position: relative;
        padding-left: 0.9rem;
        margin-bottom: 0.25rem;
        color: var(--color-text-muted);
      }
      .bullet-list li::before {
        content: "•";
        position: absolute;
        left: 0;
        color: var(--color-primary);
      }

      .field {
        display: grid;
        gap: 0.15rem;
        margin-top: 0.35rem;
      }
      .field label {
        font-size: var(--text-xs);
        font-weight: 600;
      }
      .field input,
      .field textarea,
      .field select {
        border-radius: var(--radius-sm);
        border: 1px solid var(--color-border);
        padding: 0.45rem 0.5rem;
        font-size: var(--text-xs);
        background: var(--color-surface-2);
      }

      .review-list {
        display: grid;
        gap: 0.4rem;
        margin-top: 0.4rem;
      }
      .review-item {
        border-radius: var(--radius-sm);
        border: 1px solid var(--color-divider);
        background: var(--color-surface-2);
        padding: 0.45rem 0.6rem;
      }
      .review-head {
        display: flex;
        justify-content: space-between;
        gap: 0.4rem;
        align-items: center;
        margin-bottom: 0.15rem;
      }
      .badge {
        font-size: 0.65rem;
        border-radius: var(--radius-full);
        padding: 0.1rem 0.5rem;
        font-weight: 700;
      }
      .badge.Acceptable {
        background: #efe4cf;
        color: #7b5820;
      }
      .badge.Good {
        background: #dde9d9;
        color: #37573b;
      }
      .badge.VeryGood {
        background: #d9e6ef;
        color: #34526b;
      }
      .badge.Outstanding {
        background: #ead7dd;
        color: #7b2945;
      }

      .empty {
        font-size: var(--text-xs);
        color: var(--color-text-muted);
        padding: 0.5rem 0.2rem;
      }

      .score-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.3rem;
        margin-top: 0.4rem;
      }
      .score-pill {
        border-radius: var(--radius-sm);
        border: 1px solid var(--color-divider);
        background: var(--color-surface-2);
        padding: 0.35rem 0.45rem;
        text-align: center;
      }
      .score-pill .label {
        font-size: 0.7rem;
        color: var(--color-text-muted);
      }
      .score-pill .value {
        font-size: var(--text-sm);
        font-variant-numeric: tabular-nums;
        margin-top: 0.1rem;
      }

      .blind-tip {
        font-size: var(--text-xs);
        color: var(--color-text-muted);
        margin-bottom: var(--space-3);
      }
      .blind-list {
        display: grid;
        gap: var(--space-2);
      }
      .blind-card {
        border-radius: var(--radius-md);
        border: 1px solid var(--color-border);
        background: var(--color-surface);
        padding: var(--space-3);
      }

      .muted {
        color: var(--color-text-muted);
      }

  @media (max-width: 768px) {
  .app {
    padding: var(--space-4) var(--space-2) var(--space-5);
  }
  .header-bar {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-2);
  }
  .wine-grid {
    grid-template-columns: 1fr;
  }
  .fact-grid {
    grid-template-columns: 1fr;
  }
  .score-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .wine-header {
    padding: var(--space-3);
  }
  .wine-body {
    padding: var(--space-3);
        }
      }
    </style>
  </head>

      const appState = {
        // wineId -> [{id, taster, rating, note}]
        reviews: {},
        // blind flights (초기 2개)
        blind: [
          {
            id: crypto.randomUUID(),
            name: "Flight A",
            vintage: "",
            note: "",
            reviews: [],
          },
          {
            id: crypto.randomUUID(),
            name: "Flight B",
            vintage: "",
            note: "",
            reviews: [],
          },
        ],
      };

      const ratingScale = [
        "Acceptable",
        "Good",
        "Very Good",
        "Outstanding",
      ];
      const ratingClass = {
        Acceptable: "Acceptable",
        Good: "Good",
        "Very Good": "VeryGood",
        Outstanding: "Outstanding",
      };

      const elWineList = document.getElementById("wine-list");
      const elBlindList = document.getElementById("blind-list");

      async function apiPost(payload) {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "API error");
        return data.result;
      }

      function getReviews(id) {
        return appState.reviews[id] || [];
      }

      function renderWineCards() {
        elWineList.innerHTML = wines
          .map(
            (w) => `
        <article class="wine-card" data-wine-id="${w.id}">
          <button type="button" class="wine-header" data-toggle="wine">
            <div class="wine-main">
              <div class="wine-name">${w.name}</div>
              <div class="wine-meta">${w.vintage} · ${w.region}</div>
            </div>
            <div style="display:flex;align-items:center;gap:0.35rem;">
              <span class="pill">노트 ${
                getReviews(w.id).length
              }</span>
              <span class="chevron">▾</span>
            </div>
          </button>
          <div class="wine-body">
            <div class="wine-grid">
              <div>
                <div class="fact-grid">
                  <div class="fact">
                    <label>빈티지 기후</label>
                    <div>${w.weather}</div>
                  </div>
                  <div class="fact">
                    <label>스타일</label>
                    <div>${w.style}</div>
                  </div>
                  <div class="fact">
                    <label>주요 포인트</label>
                    <div>${w.points}</div>
                  </div>
                  <div class="fact">
                    <label>점수 메모</label>
                    <div>${w.scores}</div>
                  </div>
                </div>
                <ul class="bullet-list">
                  ${w.highlights
                    .map((h) => `<li>${h}</li>`)
                    .join("")}
                </ul>
              </div>
              <div>
                <div>
                  <div class="field">
                    <label>시음자</label>
                    <select data-input="taster">
                      <option value="허의지">허의지</option>
                      <option value="허의성">허의성</option>
                      <option value="박서이">박서이</option>
                    </select>
                  </div>
                  <div class="field">
                    <label>평가</label>
                    <select data-input="rating">
                      ${ratingScale
                        .map(
                          (r) =>
                            `<option value="${r}">${r}</option>`
                        )
                        .join("")}
                    </select>
                  </div>
                  <div class="field">
                    <label>시음 메모</label>
                    <textarea
                      data-input="note"
                      placeholder="향, 산도, 타닌, 페어링 등"
                    ></textarea>
                  </div>
                  <button
                    type="button"
                    class="primary-btn"
                    data-action="save-review"
                    style="margin-top:0.4rem;width:100%;font-size:var(--text-xs);"
                  >
                    이 와인에 저장
                  </button>
                </div>
                <div style="margin-top:0.6rem;">
                  <div class="score-grid">
                    ${ratingScale
                      .map(
                        (r) => `
                      <div class="score-pill">
                        <div class="label">${r}</div>
                        <div class="value" data-score="${r}">0</div>
                      </div>
                    `
                      )
                      .join("")}
                  </div>
                  <div class="review-list" data-review-list></div>
                </div>
              </div>
            </div>
          </div>
        </article>
      `
          )
          .join("");
        updateAllReviews();
      }

      function updateCardReviews(card, id) {
        const list = getReviews(id);
        const listEl = card.querySelector("[data-review-list]");
        const pill = card.querySelector(".pill");
        if (pill) pill.textContent = `노트 ${list.length}`;
        const counters = card.querySelectorAll("[data-score]");
        counters.forEach((el) => {
          const label = el.dataset.score;
          el.textContent = list.filter((r) => r.rating === label).length;
        });
        if (!list.length) {
          listEl.innerHTML =
            '<div class="empty">아직 등록된 시음평이 없습니다.</div>';
          return;
        }
        listEl.innerHTML = list
          .map(
            (r) => `
        <article class="review-item" data-note-id="${r.id || ""}">
          <div class="review-head">
            <strong>${r.taster}</strong>
            <span class="badge ${ratingClass[r.rating]}">${
              r.rating
            }</span>
          </div>
          <div class="muted" style="font-size:var(--text-xs);">${
            r.note || "메모 없음"
          }</div>
        </article>
      `
          )
          .join("");
      }

      function updateAllReviews() {
        document
          .querySelectorAll("[data-wine-id]")
          .forEach((card) => {
            updateCardReviews(card, card.dataset.wineId);
          });
      }

      document.addEventListener("click", async (e) => {
        const headerBtn = e.target.closest("[data-toggle='wine']");
        if (headerBtn) {
          const card = headerBtn.closest(".wine-card");
          const expanded = card.classList.toggle("expanded");
          document.querySelectorAll(".wine-card").forEach((other) => {
            if (other !== card) other.classList.remove("expanded");
          });
          const chev = card.querySelector(".chevron");
          if (chev) chev.textContent = expanded ? "▴" : "▾";
          return;
        }

        const saveBtn = e.target.closest("[data-action='save-review']");
        if (saveBtn) {
          const card = saveBtn.closest(".wine-card");
          const id = card.dataset.wineId;
          const taster = card.querySelector(
            "[data-input='taster']"
          ).value;
          const rating = card.querySelector(
            "[data-input='rating']"
          ).value;
          const note = card
            .querySelector("[data-input='note']")
            .value.trim();

          try {
            const result = await apiPost({
              action: "createNote",
              wineId: id,
              taster,
              rating,
              note,
            });
            const list = getReviews(id);
            list.push({
              id: result.id,
              taster,
              rating,
              note,
            });
            appState.reviews[id] = list;
            card.querySelector("[data-input='note']").value = "";
            updateCardReviews(card, id);
          } catch (err) {
            alert("시음평 저장 실패: " + err.message);
          }
          return;
        }

        if (e.target.id === "theme-toggle") {
          const root = document.documentElement;
          const next =
            root.getAttribute("data-theme") === "dark"
              ? "light"
              : "dark";
          root.setAttribute("data-theme", next);
          e.target.textContent = next === "dark" ? "☀️" : "🌙";
          return;
        }
      });

      // 탭 전환
      document.addEventListener("click", (e) => {
        const tab = e.target.closest(".tab-btn");
        if (!tab) return;
        const name = tab.dataset.tab;
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.toggle("active", b === tab));
        document.getElementById("tab-notes").style.display =
          name === "notes" ? "" : "none";
        document.getElementById("tab-blind").style.display =
          name === "blind" ? "" : "none";
      });

      // 블라인드 렌더링
      function renderBlind() {
        elBlindList.innerHTML = appState.blind
          .map(
            (w) => `
        <section class="blind-card" data-blind-id="${w.id}">
          <div class="field">
            <label>와인 이름</label>
            <input type="text" value="${w.name}" data-blind="name" />
          </div>
          <div class="field">
            <label>빈티지/메모</label>
            <input type="text" value="${
              w.vintage
            }" data-blind="vintage" placeholder="예: NV, 2018, 미상" />
          </div>
          <div class="field">
            <label>소개 메모</label>
            <textarea data-blind="note" placeholder="색, 향, 품종·국가 추정 등">${
              w.note
            }</textarea>
          </div>
          <div class="field">
            <label>시음 메모 추가</label>
          </div>
          <div class="field" style="margin-top:0;">
            <label>시음자</label>
            <select data-blind-input="taster">
              <option value="허의지">허의지</option>
              <option value="허의성">허의성</option>
              <option value="박서이">박서이</option>
            </select>
          </div>
          <div class="field">
            <label>평가</label>
            <select data-blind-input="rating">
              ${ratingScale
                .map(
                  (r) => `<option value="${r}">${r}</option>`
                )
                .join("")}
            </select>
          </div>
          <div class="field">
            <label>시음 메모</label>
            <textarea data-blind-input="note"></textarea>
          </div>
          <div style="display:flex;gap:0.4rem;margin-top:0.3rem;">
            <button type="button" class="primary-btn" data-action="save-blind" style="font-size:var(--text-xs);">
              이 와인에 저장
            </button>
            <button type="button" class="chip-btn" data-action="remove-blind">
              삭제
            </button>
          </div>
          <div class="review-list" style="margin-top:0.5rem;">
            ${
              w.reviews.length
                ? w.reviews
                    .map(
                      (r) => `
              <article class="review-item">
                <div class="review-head">
                  <strong>${r.taster}</strong>
                  <span class="badge ${ratingClass[r.rating]}">${
                        r.rating
                      }</span>
                </div>
                <div class="muted" style="font-size:var(--text-xs);">${
                  r.note || "메모 없음"
                }</div>
              </article>
            `
                    )
                    .join("")
                : '<div class="empty">아직 등록된 블라인드 시음평이 없습니다.</div>'
            }
          </div>
        </section>
      `
          )
          .join("");
      }

      document
        .getElementById("add-blind")
        .addEventListener("click", () => {
          appState.blind.unshift({
            id: crypto.randomUUID(),
            name: `Flight ${String.fromCharCode(
              65 + appState.blind.length
            )}`,
            vintage: "",
            note: "",
            reviews: [],
          });
          renderBlind();
        });

      document.addEventListener("input", (e) => {
        const field = e.target.dataset.blind;
        if (!field) return;
        const card = e.target.closest("[data-blind-id]");
        const item = appState.blind.find(
          (w) => w.id === card.dataset.blindId
        );
        item[field] = e.target.value;
      });

      document.addEventListener("click", async (e) => {
        const card = e.target.closest("[data-blind-id]");
        if (!card) return;
        const id = card.dataset.blindId;
        const item = appState.blind.find((w) => w.id === id);

        if (e.target.dataset.action === "remove-blind") {
          appState.blind = appState.blind.filter((w) => w.id !== id);
          renderBlind();
          return;
        }

        if (e.target.dataset.action === "save-blind") {
          const taster = card.querySelector(
            "[data-blind-input='taster']"
          ).value;
          const rating = card.querySelector(
            "[data-blind-input='rating']"
          ).value;
          const note = card
            .querySelector("[data-blind-input='note']")
            .value.trim();
          const flightName = card.querySelector(
            "[data-blind='name']"
          ).value;

          try {
            const result = await apiPost({
              action: "createBlind",
              flightId: id,
              flightName,
              taster,
              rating,
              note,
            });
            item.reviews.push({
              id: result.id,
              taster,
              rating,
              note,
            });
            renderBlind();
          } catch (err) {
            alert("블라인드 시음 저장 실패: " + err.message);
          }
        }
      });

      // 초기 렌더
      renderWineCards();
      renderBlind();
    </script>
