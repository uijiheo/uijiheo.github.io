<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>안티노리 시음회 First Class 프리미엄 와인 인터랙티브 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    /* Organized final build: tokens, layout, components, stars, forms */
    :root{--bg:#f5f1eb;--surface:#fffdfa;--surface2:#efe8df;--line:#ded4c7;--text:#211b15;--muted:#6f665c;--accent:#6a1f24;--chip:#f1e7da;--r:18px;--shadow:0 18px 45px rgba(44,32,22,.08);--good:#244f38;--danger:#a33b3b;--gold:#d7a11e}
    [data-theme="dark"]{--bg:#151210;--surface:#211b17;--surface2:#2a231e;--line:#3f352d;--text:#f3ece4;--muted:#b8ab9e;--accent:#b86c73;--chip:#302822;--shadow:none;--good:#7fb58f;--danger:#de8f8f;--gold:#f0c14b}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:"Noto Sans KR",sans-serif;background:linear-gradient(180deg,var(--bg),var(--surface2));color:var(--text)}
    .wrap{max-width:1280px;margin:0 auto;padding:24px}.toolbar{display:flex;justify-content:flex-start;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}.badge{display:inline-flex;align-items:center;gap:8px;background:var(--chip);padding:10px 14px;border-radius:999px;font-size:13px}.theme-toggle{padding:6px 10px;font-size:12px;border-radius:999px;line-height:1.2}
    button,input,textarea,select{font:inherit} button{border:1px solid var(--line);background:var(--surface);color:var(--text);padding:10px 14px;border-radius:999px;cursor:pointer}
    .card{background:rgba(255,255,255,.68);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)} [data-theme="dark"] .card{background:rgba(33,27,23,.92)}
    .intro{padding:28px}.intro h1{margin:0 0 10px;font-size:30px;line-height:1.2}.intro p{margin:0;color:var(--muted);line-height:1.7}.list{padding:18px}.list h2{margin:0 0 12px;font-size:19px}
    .search{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--text);margin-bottom:14px}
    .wine-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}.wine-card{display:flex;flex-direction:column;gap:10px}.wine-item{padding:16px;border:1px solid var(--line);border-radius:16px;background:var(--surface);cursor:pointer;transition:.18s ease;min-height:140px;text-align:left;width:100%}
    .wine-item:hover,.wine-item.active{transform:translateY(-1px);border-color:var(--accent);box-shadow:0 10px 25px rgba(80,40,20,.08)} .wine-item h3{margin:0 0 4px;font-size:15px}.wine-item p{margin:0;color:var(--muted);font-size:12px;line-height:1.5}
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.chip{display:inline-block;padding:5px 9px;border-radius:999px;background:var(--chip);font-size:11px}.detail-inline{display:none;padding:18px;border:2px solid color-mix(in srgb,var(--accent) 35%, var(--line));border-radius:16px;background:linear-gradient(180deg,color-mix(in srgb,var(--chip) 55%, var(--surface)),var(--surface));box-shadow:0 18px 40px rgba(106,31,36,.08);animation:fadeIn .18s ease}.detail-inline.open{display:block}.wine-item.active{outline:2px solid color-mix(in srgb,var(--accent) 35%, transparent)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}} .headline{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}.headline h3{margin:0;font-size:22px;line-height:1.2}.sub{color:var(--muted);font-size:13px;margin-top:4px}.vintage{padding:7px 10px;border-radius:999px;background:var(--chip);font-size:12px;white-space:nowrap}
    .section{margin-top:16px}.section h4{margin:0 0 8px;font-size:14px;color:var(--accent)} .kv{display:grid;grid-template-columns:120px 1fr;gap:8px 14px;font-size:14px}.kv div{padding:8px 0;border-bottom:1px solid var(--line)}.kv .k{color:var(--muted)}
    .quote{padding:14px 15px;border:1px solid var(--line);border-radius:14px;background:var(--surface);margin-bottom:10px}.quote strong{display:block;font-size:13px;margin-bottom:4px}.quote p{margin:0;color:var(--muted);line-height:1.6;font-size:13px}.note{padding:14px;border-radius:14px;background:var(--surface);border:1px solid var(--line);font-size:13px;color:var(--muted);line-height:1.7}
    .chat-wrap{margin-top:16px;padding:16px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,var(--surface),rgba(255,255,255,.4))}.chat-top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap}.chat-top h4{margin:0;font-size:14px;color:var(--accent)} .avg-badge,.status-badge{padding:7px 10px;border-radius:999px;background:var(--chip);font-size:12px;color:var(--text)} .status-badge.error{color:var(--danger)}
    .chat-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;max-height:480px;overflow:auto;padding-right:4px}.chat-empty{padding:14px;border:1px dashed var(--line);border-radius:12px;color:var(--muted);font-size:13px;background:var(--surface)}
    .chat-item{padding:12px 13px;border:1px solid var(--line);border-radius:14px;background:var(--surface)}.chat-meta{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:6px;flex-wrap:wrap}.chat-user{font-size:13px;font-weight:700;color:var(--text)}.chat-score{font-size:12px;color:var(--good);background:var(--chip);padding:5px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}.chat-time{font-size:11px;color:var(--muted)}.chat-text{font-size:13px;line-height:1.6;color:var(--muted);white-space:pre-wrap}
    .chat-form{display:grid;gap:10px}.form-row{display:grid;grid-template-columns:1fr;gap:10px}.field,.textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--text)}.textarea{min-height:88px;resize:vertical}.chat-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.helper{font-size:12px;color:var(--muted)}.submit-btn{background:var(--accent);color:#fff;border-color:transparent}.submit-btn:disabled{opacity:.6;cursor:not-allowed}
    .stars{display:inline-flex;gap:2px;letter-spacing:0}.star-full,.star-half,.star-empty{position:relative;display:inline-flex;width:14px;height:14px}.star-full::before,.star-half::before,.star-empty::before{content:'★';position:absolute;inset:0;font-size:14px;line-height:1;color:var(--gold)}.star-empty::before{color:#c7b89a}.star-half::before{color:#c7b89a}.star-half::after{content:'★';position:absolute;left:0;top:0;width:50%;overflow:hidden;font-size:14px;line-height:1;color:var(--gold)}
    .star-picker{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.star-btn{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface);cursor:pointer}.star-btn.active{border-color:var(--accent);background:var(--chip)}.star-visual{display:inline-flex;align-items:center}.star-text{font-size:12px;color:var(--muted)}
    .footer{margin-top:18px;padding:14px 16px;font-size:12px;color:var(--muted)} @media (max-width:720px){.wine-grid{grid-template-columns:1fr}.headline{flex-direction:column}.intro h1{font-size:26px}.kv{grid-template-columns:100px 1fr}.wrap{padding:16px}.toolbar{align-items:flex-start;flex-direction:column}.chat-actions{align-items:stretch}.submit-btn{width:100%}.star-picker{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <div class="badge">🍷 안티노리 시음회 First Class 프리미엄 와인 인터랙티브 대시보드</div>
    <button id="themeBtn" class="theme-toggle" type="button">다크</button>
  </div>
  <section class="card intro">
    <h1>와인을 누르면 상세 정보를 확인할 수 있어요</h1>
    <p>원하는 와인을 선택하면 상세 정보, 전문가 코멘트, 참석자 시음평을 한 화면에서 바로 볼 수 있도록 구성했습니다.</p>
  </section>
  <section class="card list" style="margin-top:18px;">
    <h2>Wine List</h2>
    <input id="search" class="search" placeholder="와인명, 산지, 품종으로 검색" />
    <div id="wineGrid" class="wine-grid"></div>
  </section>
  
</div>
<script>
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbyOAMYtkgnxeWQ5OAu2DQuVt3CIAOFaSyRvsw8T33zXMoXoS66WMti1WqJ0A7BLepqn/exec'
};

const wines = [
{id:'conte-aymo',name:'마르케제 안티노리 콘테 아이모',eng:'Marchese Antinori Conte Aymo',vintage:'2020',region:'이탈리아 롬바르디아 프란차코르타',blend:'피노 누아(블랑 드 누아 스타일)',style:'전통 방식 스파클링',price:'Wine-Searcher 평균 약 7만~8만원대',profile:'섬세한 기포, 브리오슈, 시트러스, 깔끔한 마감이 핵심입니다.',key:'첫 잔으로 입맛을 깨우기 좋고, 뒤에 나올 화이트와 레드의 강도를 방해하지 않는 장점이 있습니다.',expert:[{source:'학습 메모',score:'-',text:'프란차코르타의 전형을 보기 좋은 와인으로, 샴페인 방식 스파클링의 효모감과 산도의 균형을 체크하면 좋습니다.'}],tags:['스파클링','프란차코르타','피노누아']},
{id:'cervaro',name:'체르바로 델라 살라',eng:'Cervaro della Sala',vintage:'2016 / 2024',region:'이탈리아 움브리아 Castello della Sala',blend:'샤르도네, 그레케토',style:'오크 숙성 프리미엄 화이트',price:'Wine-Searcher 평균 약 11만~13만원대',profile:'버터, 헤이즐넛, 흰 꽃, 핵과실, 토스티함이 잘 드러나는 이탈리아 대표급 화이트입니다.',key:'말로락틱과 배럴 숙성이 만드는 크리미한 질감과 숙성 잠재력을 보는 와인입니다.',expert:[{source:'판매 페이지 요약',score:'-',text:'2024 빈티지는 샤르도네와 그레케토 블렌드로, 파인애플·망고·바닐라·로스티드 넛 향과 복합적인 질감이 강조됩니다.'},{source:'WonderUmbria',score:'-',text:'카모마일, 흰 꽃, 부싯돌, 바닐라, 시트러스, 헤이즐넛 버터 뉘앙스를 대표적으로 설명합니다.'},{source:'Vivino/판매자료',score:'참고',text:'크리미한 질감과 긴 피니시, 숙성형 이탈리아 화이트의 면모가 강조됩니다.'}],tags:['화이트','움브리아','샤르도네']},
{id:'guado',name:'구아도 알 타소',eng:'Guado al Tasso',vintage:'2001 / 2021',region:'이탈리아 토스카나 볼게리',blend:'카베르네 소비뇽 중심 보르도 블렌드',style:'슈퍼투스칸 레드',price:'Wine-Searcher 평균 약 20만~24만원대',profile:'검은 과실, 시가박스, 허브, 흑연, 농밀한 질감과 구조감이 포인트입니다.',key:'볼게리 스타일의 파워와 세련됨을 동시에 보여주는 대표 와인입니다.',expert:[{source:'학습 메모',score:'-',text:'볼게리 슈퍼투스칸의 전형을 이해하기 좋은 병으로, 나파 카베르네와 비교하면 산도와 허브톤에서 차이가 분명하게 느껴질 수 있습니다.'},{source:'Superiore.de',score:'-',text:'다크 체리, 카시스, 바이올렛, 감초, 따뜻한 스파이스와 타바코, 매끈한 탄닌과 긴 여운이 특징으로 설명됩니다.'}],tags:['레드','볼게리','슈퍼투스칸']},
{id:'matarocchio',name:'마타로키오',eng:'Matarocchio',vintage:'2021',region:'이탈리아 토스카나 볼게리',blend:'카베르네 프랑 중심',style:'아이콘급 레드',price:'Wine-Searcher 평균 약 60만~70만원대',profile:'짙은 검은 과실, 스파이스, 플로럴, 미세한 탄닌과 높은 응축도가 특징입니다.',key:'희소성과 밀도 모두 높은 와인이라 후반부 집중 시음용으로 적합합니다.',expert:[{source:'학습 메모',score:'-',text:'카베르네 프랑의 품종 캐릭터와 볼게리의 성숙한 과실 표현이 어떻게 결합되는지 보기 좋습니다.'},{source:'Vivino',score:'-',text:'카베르네 프랑 기반의 깊이 있는 아이콘 와인으로 커뮤니티 평가가 매우 높은 편입니다.'}],tags:['레드','볼게리','카베르네프랑']},
{id:'brunello',name:'피안 델레 비네 브루넬로 리제르바 비냐페로비아',eng:'Pian delle Vigne Brunello Riserva Vignaferrovia',vintage:'2019',region:'이탈리아 토스카나 몬탈치노',blend:'산지오베제 그로쏘 100%',style:'브루넬로 리제르바',price:'Wine-Searcher 기준 약 18만~25만원대 예상',profile:'붉은 체리, 말린 허브, 흙, 산미, 탄닌, 긴 숙성 잠재력이 매력입니다.',key:'슈퍼투스칸과 달리 산지오베제 순수 품종의 구조를 보기 좋습니다.',expert:[{source:'학습 메모',score:'-',text:'산미와 탄닌, 여운을 같이 봐야 하는 와인으로, 바롤로와 비교 시 방향성이 매우 다릅니다.'}],tags:['레드','브루넬로','산지오베제']},

{id:'solaia',name:'솔라이아',eng:'Solaia',vintage:'2015 / 2020',region:'이탈리아 토스카나 Tignanello Estate',blend:'2020 기준 70% Cabernet Sauvignon, 15% Sangiovese, 15% Cabernet Franc',style:'안티노리 플래그십 슈퍼투스칸',price:'Wine-Searcher 평균 약 40만~50만원대',profile:'카시스, 블랙체리, 바이올렛, 시더, 담배, 흑연, 정교한 탄닌과 긴 여운이 중심입니다.',key:'파워는 크지만 투스카니 특유의 산도와 구조가 살아 있어 나파 카베르네와 결이 다릅니다.',expert:[{source:'Jane Anson',score:'98',text:'정향, 세이지, 흑연, 말린 허브, 빌베리와 카시스가 어우러지고 길이감과 매력이 뛰어난 훌륭한 빈티지로 평가됩니다.'},{source:'James Suckling',score:'98',text:'커런트, 꽃, 세이지 향과 초미세 탄닌, 길고 풍미 있는 피니시가 돋보이는 세련된 와인으로 평가됩니다.'},{source:'Vinous',score:'97',text:'블랙체리, 자두, 자갈, 인센스, 스모크, 연필심 뉘앙스가 펼쳐지며, 더 클래식하고 균형 지향적인 스타일로 해석됩니다.'},{source:'Vivino',score:'4.7/5',text:'오크, 담배, 초콜릿 계열 언급이 특히 많이 보이는 토스카나 레드로 소개됩니다.'}],tags:['레드','토스카나','플래그십']},

const state = { allNotes: [], openedId: null };
const wineGrid=document.getElementById('wineGrid');
const searchInput=document.getElementById('search');
const themeBtn=document.getElementById('themeBtn');
function escapeHtml(str=''){return String(str).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
function formatDate(value){if(!value) return ''; const d=new Date(value); if(Number.isNaN(d.getTime())) return String(value); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function getWineNotes(wineId){return state.allNotes.filter(n=>n.wineId===wineId).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));}
function getAverageScore(wineId){const notes=getWineNotes(wineId).filter(n=>!isNaN(Number(n.score))); if(!notes.length) return null; return (notes.reduce((s,n)=>s+Number(n.score),0)/notes.length).toFixed(1);}
async function fetchNotes(){const res=await fetch(CONFIG.API_URL); if(!res.ok) throw new Error('불러오기 실패'); const data=await res.json(); state.allNotes=Array.isArray(data)?data:[];}
async function saveNote(payload){const body=new URLSearchParams({wineId:payload.wineId,wineName:payload.wineName,userName:payload.userName,score:payload.score,comment:payload.comment}); const res=await fetch(CONFIG.API_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:body.toString()}); if(!res.ok) throw new Error('저장 실패'); return res.text();}
function scoreToStars(score){const n=Math.max(0,Math.min(10,Number(score)||0)); const full=Math.floor(n/2); const half=n%2; let html='<span class="stars" aria-hidden="true">'; for(let i=0;i<full;i++) html+='<span class="star-full"></span>'; if(half) html+='<span class="star-half"></span>'; for(let i=0;i<5-full-half;i++) html+='<span class="star-empty"></span>'; html+='</span>'; return html;}
function renderScoreLabel(score){return `${scoreToStars(score)} <span>${escapeHtml(score)}/10</span>`;}
function scoreOptionLabel(score){const labels={1:'반별 1개',2:'별 1개',3:'별 1개 + 반별 1개',4:'별 2개',5:'별 2개 + 반별 1개',6:'별 3개',7:'별 3개 + 반별 1개',8:'별 4개',9:'별 4개 + 반별 1개',10:'별 5개'}; return labels[score]||`${score}/10`;}
function renderChatList(wineId){const notes=getWineNotes(wineId); if(!notes.length) return '<div class="chat-empty">아직 남겨진 시음평이 없습니다. 첫 코멘트를 남겨보세요.</div>'; return notes.map(note=>`<div class="chat-item"><div class="chat-meta"><div><div class="chat-user">${escapeHtml(note.userName||'')}</div><div class="chat-time">${escapeHtml(formatDate(note.timestamp))}</div></div><div class="chat-score">${renderScoreLabel(note.score)}</div></div><div class="chat-text">${escapeHtml(note.comment||'')}</div></div>`).join('');}
function detailHTML(w,status=''){const avg=getAverageScore(w.id); return `<div class="headline"><div><h3>${w.name}</h3><div class="sub">${w.eng}</div></div><div class="vintage">빈티지 ${w.vintage}</div></div><div class="section"><div class="kv"><div class="k">산지</div><div>${w.region}</div><div class="k">블렌딩</div><div>${w.blend}</div><div class="k">스타일</div><div>${w.style}</div><div class="k">참고가</div><div>${w.price}</div></div></div><div class="section"><h4>핵심 특징</h4><div class="note">${w.profile}</div></div><div class="section"><h4>공부 포인트</h4><div class="note">${w.key}</div></div><div class="section"><h4>전문가 평가 / 빈티지 코멘트</h4>${w.expert.map(q=>`<div class="quote"><strong>${q.source}${q.score !== '-' ? ' · '+q.score+'점' : ''}</strong><p>${q.text}</p></div>`).join('')}</div><div class="chat-wrap"><div class="chat-top"><h4>참석자 시음평</h4><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;"><div class="avg-badge">${avg ? `평균 ${scoreToStars(Math.round(Number(avg)))} ${avg}/10 · ${getWineNotes(w.id).length}명` : '아직 평점 없음'}</div>${status ? `<div class="status-badge ${status.includes('실패') ? 'error' : ''}">${escapeHtml(status)}</div>`:''}</div></div><div class="chat-list">${renderChatList(w.id)}</div><form class="chat-form" data-wine-form="${w.id}"><div class="form-row"><select class="field" name="user" required><option value="">평가자</option><option value="허의지">허의지</option><option value="허의성">허의성</option><option value="박서이">박서이</option></select></div><select class="field" name="score" required><option value="">평점 선택</option><option value="1">0.5★ (1점)</option><option value="2">1★ (2점)</option><option value="3">1.5★ (3점)</option><option value="4">2★ (4점)</option><option value="5">2.5★ (5점)</option><option value="6">3★ (6점)</option><option value="7">3.5★ (7점)</option><option value="8">4★ (8점)</option><option value="9">4.5★ (9점)</option><option value="10">5★ (10점)</option></select><textarea class="textarea" name="text" placeholder="향, 산도, 질감, 여운, 음식 페어링 인상 등을 자유롭게 남겨보세요." maxlength="300" required></textarea><div class="chat-actions"><button class="submit-btn" type="submit">시음평 남기기</button></div></form></div>`;}
function bindChatForms(){document.querySelectorAll('[data-wine-form]').forEach(form=>{if(form.dataset.bound==='true') return; form.dataset.bound='true'; form.addEventListener('submit',async e=>{e.preventDefault(); const wineId=form.getAttribute('data-wine-form'); const wine=wines.find(v=>v.id===wineId); const userName=form.user.value.trim(); const score=form.score.value; const comment=form.text.value.trim(); const submitBtn=form.querySelector('.submit-btn'); const detail=form.closest('.detail-inline'); if(!userName||!score||!comment) return; submitBtn.disabled=true; submitBtn.textContent='저장 중...'; try{await saveNote({wineId,wineName:wine.name,userName,score,comment}); await fetchNotes(); detail.innerHTML=detailHTML(wine,'저장 완료'); bindChatForms();}catch(err){detail.innerHTML=detailHTML(wine,'저장 실패 · Apps Script 코드/재배포 확인'); bindChatForms();}});});}
function renderList(filter=''){wineGrid.innerHTML=''; const filtered=wines.filter(w=>[w.name,w.eng,w.region,w.blend,...(w.tags||[])].join(' ').toLowerCase().includes(filter.toLowerCase())); if(!filtered.length){wineGrid.innerHTML='<div class="note">검색 결과가 없습니다.</div>'; state.state.openedId=null; return;} filtered.forEach((wine,idx)=>{const wrap=document.createElement('div'); wrap.className='wine-card'; const item=document.createElement('button'); item.type='button'; item.className='wine-item'; item.dataset.id=wine.id; item.innerHTML=`<h3>${wine.name}</h3><p>${wine.eng}</p><p>${wine.vintage} · ${wine.region}</p><div class="chips">${wine.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div>`; const detail=document.createElement('div'); detail.className='detail-inline'; detail.innerHTML=detailHTML(wine); item.addEventListener('click',()=>{const isSame=state.openedId===wine.id; document.querySelectorAll('.wine-item').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.detail-inline').forEach(el=>el.classList.remove('open')); if(isSame){state.openedId=null; return;} item.classList.add('active'); detail.classList.add('open'); openedId=wine.id; bindChatForms();}); wrap.appendChild(item); wrap.appendChild(detail); wineGrid.appendChild(wrap); if(idx===0 && !state.openedId){item.classList.add('active'); detail.classList.add('open'); state.openedId=wine.id;}}); bindChatForms();}
searchInput.addEventListener('input',e=>{state.openedId=null; renderList(e.target.value);});
async function init(){try{await fetchNotes();}catch(e){state.allNotes=[];} renderList();}
init();
themeBtn.addEventListener('click',()=>{const html=document.documentElement; const next=html.getAttribute('data-theme')==='dark'?'light':'dark'; html.setAttribute('data-theme',next); themeBtn.textContent=next==='dark'?'라이트':'다크';});
</script>
