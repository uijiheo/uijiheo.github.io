<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>안티노리 시음회 First Class 프리미엄 와인 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    /* Organized final build: tokens, layout, components, stars, forms */
    :root{--bg:#f5f1eb;--surface:#fffdfa;--surface2:#efe8df;--line:#ded4c7;--text:#211b15;--muted:#6f665c;--accent:#6a1f24;--chip:#f1e7da;--r:18px;--shadow:0 18px 45px rgba(44,32,22,.08);--good:#244f38;--danger:#a33b3b;--gold:#d7a11e}
    [data-theme="dark"]{--bg:#151210;--surface:#211b17;--surface2:#2a231e;--line:#3f352d;--text:#f3ece4;--muted:#b8ab9e;--accent:#b86c73;--chip:#302822;--shadow:none;--good:#7fb58f;--danger:#de8f8f;--gold:#f0c14b}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:"Noto Sans KR",sans-serif;background:linear-gradient(180deg,var(--bg),var(--surface2));color:var(--text)}
    .wrap{max-width:1280px;margin:0 auto;padding:24px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:nowrap}.badge{display:inline-flex;align-items:center;gap:8px;background:var(--chip);padding:8px 12px;border-radius:999px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0}#themeBtn{flex:0 0 auto;padding:8px 10px;font-size:12px;white-space:nowrap}
    button,input,textarea,select{font:inherit} button{border:1px solid var(--line);background:var(--surface);color:var(--text);padding:10px 14px;border-radius:999px;cursor:pointer}
    .card{background:rgba(255,255,255,.68);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)} [data-theme="dark"] .card{background:rgba(33,27,23,.92)}
    .intro{padding:28px}.intro h1{margin:0;font-size:22px;line-height:1.45;font-weight:700;color:var(--text)}.intro p{margin:0;color:var(--muted);line-height:1.7}.list{padding:18px}.list h2{margin:0 0 12px;font-size:19px}
    .search{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--text);margin-bottom:14px}
    .wine-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}.wine-card{display:flex;flex-direction:column;gap:10px}.wine-item{padding:16px;border:1px solid var(--line);border-radius:16px;background:var(--surface);cursor:pointer;transition:.18s ease;min-height:140px;text-align:left;width:100%}
    .wine-item:hover,.wine-item.active{transform:translateY(-1px);border-color:var(--accent);box-shadow:0 10px 25px rgba(80,40,20,.08)} .wine-item h3{margin:0 0 4px;font-size:15px}.wine-item p{margin:0;color:var(--muted);font-size:12px;line-height:1.5}
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.chip{display:inline-block;padding:5px 9px;border-radius:999px;background:var(--chip);font-size:11px}.detail-inline{display:none;padding:18px;border:1px solid var(--line);border-radius:16px;background:var(--surface);animation:fadeIn .18s ease}.detail-inline.open{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}} .headline{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}.headline h3{margin:0;font-size:22px;line-height:1.2}.sub{color:var(--muted);font-size:13px;margin-top:4px}.vintage{padding:7px 10px;border-radius:999px;background:var(--chip);font-size:12px;white-space:nowrap}
    .section{margin-top:16px}.section h4{margin:0 0 8px;font-size:14px;color:var(--accent)} .kv{display:grid;grid-template-columns:120px 1fr;gap:8px 14px;font-size:14px}.kv div{padding:8px 0;border-bottom:1px solid var(--line)}.kv .k{color:var(--muted)}
    .quote{padding:14px 15px;border:1px solid var(--line);border-radius:14px;background:var(--surface);margin-bottom:10px}.quote strong{display:block;font-size:13px;margin-bottom:4px}.quote p{margin:0;color:var(--muted);line-height:1.6;font-size:13px}.note{padding:14px;border-radius:14px;background:var(--surface);border:1px solid var(--line);font-size:13px;color:var(--muted);line-height:1.7}
    .chat-wrap{margin-top:16px;padding:16px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,var(--surface),rgba(255,255,255,.4))}.chat-top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap}.chat-top h4{margin:0;font-size:14px;color:var(--accent)} .avg-badge,.status-badge{padding:7px 10px;border-radius:999px;background:var(--chip);font-size:12px;color:var(--text)} .status-badge.error{color:var(--danger)}
    .chat-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;max-height:480px;overflow:auto;padding-right:4px}.chat-empty{padding:14px;border:1px dashed var(--line);border-radius:12px;color:var(--muted);font-size:13px;background:var(--surface)}
    .chat-item{padding:12px 13px;border:1px solid var(--line);border-radius:14px;background:var(--surface)}.chat-meta{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:6px;flex-wrap:wrap}.chat-user{font-size:13px;font-weight:700;color:var(--text)}.chat-score{font-size:12px;color:var(--good);background:var(--chip);padding:5px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}.chat-time{font-size:11px;color:var(--muted)}.chat-text{font-size:13px;line-height:1.6;color:var(--muted);white-space:pre-wrap}.chat-item-actions{display:flex;justify-content:flex-end;margin-top:10px}.delete-note-btn{border:1px solid var(--line);background:transparent;color:var(--muted);padding:6px 10px;border-radius:999px;font-size:12px}.delete-note-btn:hover{border-color:var(--accent);color:var(--accent)}
    .chat-form{display:grid;gap:10px}.form-row{display:grid;grid-template-columns:1fr;gap:10px}.field,.textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--text)}.field{font-size:13px;font-weight:400}.textarea{min-height:88px;resize:vertical}.chat-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.helper{font-size:12px;color:var(--muted)}.submit-btn{background:var(--accent);color:#fff;border-color:transparent}.submit-btn:disabled{opacity:.6;cursor:not-allowed}
    .stars{display:inline-flex;gap:2px;letter-spacing:0}.star-full,.star-half,.star-empty{position:relative;display:inline-flex;width:14px;height:14px}.star-full::before,.star-half::before,.star-empty::before{content:'★';position:absolute;inset:0;font-size:14px;line-height:1;color:var(--gold)}.star-empty::before{color:#c7b89a}.star-half::before{color:#c7b89a}.star-half::after{content:'★';position:absolute;left:0;top:0;width:50%;overflow:hidden;font-size:14px;line-height:1;color:var(--gold)}
    .rating-select-wrap{display:grid;gap:8px}.rating-trigger{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface);cursor:pointer}.rating-trigger.active{border-color:var(--accent);background:var(--chip)}.rating-trigger-text{font-size:14px;font-weight:400;color:var(--text);display:inline-flex;align-items:center;gap:6px}.rating-panel{display:none;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.rating-panel.open{display:grid}.star-btn{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface);cursor:pointer}.star-btn.active{border-color:var(--accent);background:var(--chip)}.star-visual{display:inline-flex;align-items:center}.star-text{font-size:12px;color:var(--muted)}
    .footer{margin-top:18px;padding:14px 16px;font-size:12px;color:var(--muted)} @media (max-width:720px){.wine-grid{grid-template-columns:1fr}.headline{flex-direction:column}.intro h1{font-size:18px;line-height:1.5}.kv{grid-template-columns:100px 1fr}.wrap{padding:16px}.toolbar{align-items:center;flex-direction:row;flex-wrap:nowrap}.chat-actions{align-items:stretch}.submit-btn{width:100%}.star-picker{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <div class="badge">🍷 안티노리 First Class 대시보드</div>
    <button id="themeBtn" type="button">다크모드</button>
  </div>
  <section class="card intro">
    <h1>와인을 누르면 상세정보를 확인하고 시음평을 바로 남길 수 있어요.</h1>
  </section>
  <section class="card list" style="margin-top:18px;">
    <h2>Wine List</h2>
    <input id="search" class="search" placeholder="와인명, 산지, 품종으로 검색" />
    <div id="wineGrid" class="wine-grid"></div>
  </section>
  <div class="card footer"></div>
</div>
<script>
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbx3kr6YjRPLqDEXOqySuxGrXVqEbQgjMwK7QiFYiwQvyVkcmDkotRqFHxVwPr1uI0qp/exec'
};

const wines = [{id:'conte-aymo',name:'마르케제 안티노리 콘테 아이모',eng:'Marchese Antinori Conte Aymo',vintage:'2020',region:'이탈리아 롬바르디아 프란차코르타',blend:'피노 누아(블랑 드 누아 스타일)',style:'전통 방식 스파클링',price:'Wine-Searcher 평균 약 7만~8만원대',profile:'섬세한 기포, 브리오슈, 시트러스, 깔끔한 마감이 핵심입니다.',key:'첫 잔으로 입맛을 깨우기 좋고, 뒤에 나올 화이트와 레드의 강도를 방해하지 않는 장점이 있습니다.',expert:[{source:'스타일 코멘트',score:'-',text:'프란차코르타 전통 방식 스파클링의 전형을 보기 좋은 와인으로, 효모감과 산도, 섬세한 기포의 균형이 핵심입니다.'},{source:'빈티지 메모',score:'-',text:'2020은 첫 잔으로 쓰기 좋은 안정적 스타일로 읽히며, 과도한 숙성감보다 신선도와 브리오슈 결의 조화에 집중하면 좋습니다.'},{source:'시음 포인트',score:'-',text:'샴페인과 비교하면 좀 더 부드럽고 친근하게 느껴질 수 있으며, 뒤에 나올 화이트와 레드의 입맛을 깨우는 역할에 잘 맞습니다.'}],tags:['스파클링','프란차코르타','피노누아']},
{id:'cervaro',name:'체르바로 델라 살라',eng:'Cervaro della Sala',vintage:'2016 / 2024',region:'이탈리아 움브리아 Castello della Sala',blend:'샤르도네, 그레케토',style:'오크 숙성 프리미엄 화이트',price:'Wine-Searcher 평균 약 11만~13만원대',profile:'버터, 헤이즐넛, 흰 꽃, 핵과실, 토스티함이 잘 드러나는 이탈리아 대표급 화이트입니다.',key:'말로락틱과 배럴 숙성이 만드는 크리미한 질감과 숙성 잠재력을 보는 와인입니다.',expert:[{source:'출시 코멘트 요약',score:'-',text:'2024 체르바로는 타이트하고 우아하며 신선도가 특히 뛰어난 스타일로 소개됩니다.'},{source:'빈티지 메모',score:'-',text:'최근 체르바로는 오크 존재감보다 긴장감과 수직적인 산도를 살리는 방향으로 해석되어, 더 슬림하고 정교한 화이트로 받아들여집니다.'},{source:'지역/스타일 코멘트',score:'-',text:'움브리아 고지대 석회·점토 토양의 서늘한 결이 살아나면 열대 과실보다 시트러스, 흰 꽃, 헤이즐넛, 짭짤한 미네랄이 더 또렷하게 드러납니다.'}],tags:['화이트','움브리아','샤르도네']},
{id:'dreams',name:'예르만 W 드림스',eng:'Jermann Where Dreams',vintage:'OLD VIN',region:'이탈리아 프리울리',blend:'샤르도네',style:'배럴 숙성 화이트',price:'Wine-Searcher 평균 약 9만~10만원대',profile:'열대과실, 바닐라, 크리미한 질감, 풍만한 바디가 핵심입니다.',key:'화이트 라인의 가장 리치한 축으로 보면 좋습니다.',expert:[{source:'스타일 코멘트',score:'-',text:'Where Dreams는 프리울리 화이트 중에서도 더 풍만하고 오크 숙성의 존재감이 뚜렷한 샤르도네 스타일로 알려져 있습니다.'},{source:'빈티지 메모',score:'-',text:'이 와인은 빈티지 차이보다 하우스 스타일 일관성이 강한 편이며, 잘 익은 과실과 배럴 숙성이 주는 바닐라·버터·페이스트리 결이 핵심입니다.'},{source:'지역 코멘트',score:'-',text:'프리울리의 선명한 산도가 바탕에 남아 있어 미국식 샤르도네처럼 풍만해도 끝이 무겁게 떨어지지 않는 점이 장점입니다.'}],tags:['화이트','프리울리','샤르도네']},
{id:'tunina',name:'예르만 빈티지 투니나',eng:'Jermann Vintage Tunina',vintage:'OLD VIN',region:'이탈리아 프리울리',blend:'소비뇽 블랑, 샤르도네, 리볼라 잘라, 말바시아 등',style:'아로마틱 화이트 블렌드',price:'Wine-Searcher 평균 약 9만~11만원대',profile:'흰 꽃, 허브, 핵과실, 이국적인 향과 부드러운 텍스처가 매력입니다.',key:'복합적인 향 레이어를 공부하기 좋은 화이트입니다.',expert:[{source:'스타일 코멘트',score:'-',text:'Vintage Tunina는 소비뇽 블랑, 샤르도네, 리볼라 잘라, 말바시아 등 여러 품종을 함께 수확해 만드는 예르만의 대표 블렌드입니다.'},{source:'빈티지 메모',score:'-',text:'이 와인은 특정 한 해의 파워보다도 실키함, 향의 층위, 숙성 후 복합성으로 높이 평가되며, 좋은 병은 오래된 빈티지에서도 생동감을 유지하는 것으로 유명합니다.'},{source:'지역 코멘트',score:'-',text:'프리울리 화이트의 장점인 향의 화려함과 짭짤함, 부드러운 질감이 함께 드러나 시음회에서 화이트 라인의 복합성 축을 담당하기 좋습니다.'}],tags:['화이트','프리울리','블렌드']},
{id:'guado',name:'구아도 알 타소',eng:'Guado al Tasso',vintage:'2001 / 2021',region:'이탈리아 토스카나 볼게리',blend:'카베르네 소비뇽 중심 보르도 블렌드',style:'슈퍼투스칸 레드',price:'Wine-Searcher 평균 약 20만~24만원대',profile:'검은 과실, 시가박스, 허브, 흑연, 농밀한 질감과 구조감이 포인트입니다.',key:'볼게리 스타일의 파워와 세련됨을 동시에 보여주는 대표 와인입니다.',expert:[{source:'Vinous 요약',score:'98',text:'2021 구아도 알 타소는 힘보다 정교함을 강조하는 매우 아름다운 빈티지로 평가되며, 실키한 탄닌과 블랙체리, 감초, 스파이스, 모카, 가죽 뉘앙스가 핵심입니다.'},{source:'생산자 빈티지 노트',score:'5-Star',text:'2021 볼게리는 여름 후반의 큰 일교차가 향의 정밀도와 산도 보존에 유리했고, 잘 익은 달콤한 탄닌과 긴 숙성 잠재력으로 매우 우수한 해로 언급됩니다.'},{source:'지역 코멘트',score:'-',text:'볼게리 2021은 과숙 일변도보다는 구조와 신선함의 균형이 좋아, 카베르네 중심 블렌드가 더 세련되고 토스카나다운 산도를 보여주기 좋은 해로 읽힙니다.'}],tags:['레드','볼게리','슈퍼투스칸']},
{id:'matarocchio',name:'마타로키오',eng:'Matarocchio',vintage:'2021',region:'이탈리아 토스카나 볼게리',blend:'카베르네 프랑 중심',style:'아이콘급 레드',price:'Wine-Searcher 평균 약 60만~70만원대',profile:'짙은 검은 과실, 스파이스, 플로럴, 미세한 탄닌과 높은 응축도가 특징입니다.',key:'희소성과 밀도 모두 높은 와인이라 후반부 집중 시음용으로 적합합니다.',expert:[{source:'생산자 코멘트',score:'Exceptional',text:'안티노리는 2021 마타로키오를 강도, 세련된 탄닌, 신선함의 균형이 뛰어난 예외적 빈티지로 소개합니다.'},{source:'전문가 요약',score:'-',text:'2021은 카베르네 프랑의 품종 개성이 뚜렷하고, 짙은 과실과 멘톨, 허브, 염기감, 강한 구조가 함께 드러나는 장기 숙성형 스타일로 평가됩니다.'},{source:'지역 코멘트',score:'-',text:'볼게리 2021의 장점인 농도와 신선함의 균형이 잘 드러나는 사례로, 파워는 크지만 무겁게 처지지 않는 점을 체크하면 좋습니다.'}],tags:['레드','볼게리','카베르네프랑']},
{id:'brunello',name:'피안 델레 비네 브루넬로 리제르바 비냐페로비아',eng:'Pian delle Vigne Brunello Riserva Vignaferrovia',vintage:'2019',region:'이탈리아 토스카나 몬탈치노',blend:'산지오베제 그로쏘 100%',style:'브루넬로 리제르바',price:'Wine-Searcher 기준 약 18만~25만원대 예상',profile:'붉은 체리, 말린 허브, 흙, 산미, 탄닌, 긴 숙성 잠재력이 매력입니다.',key:'슈퍼투스칸과 달리 산지오베제 순수 품종의 구조를 보기 좋습니다.',expert:[{source:'Wine Spectator',score:'93',text:'2019 비냐페로비아 리제르바는 짙은 과실과 플로럴 노트, 선명한 산도, 두터운 초키 탄닌이 공존하며 시간이 필요한 구조감 있는 스타일로 평가됩니다.'},{source:'빈티지 메모',score:'-',text:'몬탈치노 2019는 전반적으로 균형과 숙성 잠재력이 뛰어난 해로 폭넓게 호평받았고, 과실의 농도와 산도 사이의 조화가 특히 장점으로 언급됩니다.'},{source:'지역 코멘트',score:'-',text:'좋은 2019 브루넬로는 힘만 앞세우기보다 붉은 체리, 허브, 꽃향, 산도, 긴 피니시가 정교하게 맞물리는 것이 핵심 포인트입니다.'}],tags:['레드','브루넬로','산지오베제']},
{id:'barolo',name:'프루노토 바롤로 리제르바 비나 콜로넬로',eng:'Prunotto Barolo Riserva Vigna Colonnello',vintage:'2014',region:'이탈리아 피에몬테 바롤로',blend:'네비올로 100%',style:'바롤로 리제르바',price:'Wine-Searcher 평균 약 23만~26만원대',profile:'장미, 타르, 붉은 과실, 높은 산도와 강한 탄닌, 긴 피니시가 핵심입니다.',key:'가장 강한 구조감 중 하나라 시음 마지막에 두기 좋습니다.',expert:[{source:'Vinous / Galloni',score:'94',text:'2014 비냐 콜로넬로 리제르바는 플로럴하고 세이보리한 고음역이 인상적인 개성형 바롤로로, 중량감은 절제되어도 깊이와 신선함을 함께 갖춘다고 평가됩니다.'},{source:'빈티지 메모',score:'-',text:'피에몬테 2014는 까다로운 기후의 복합 빈티지였지만, 시즌 후반이 좋아 좋은 생산자와 좋은 사이트에서는 의외로 우아하고 섬세한 결과물이 나왔다는 평가가 많습니다.'},{source:'시음 포인트',score:'-',text:'이 병은 강건함보다 향의 상승감, 허브·장미·타르의 디테일, 디캔팅 후 정리되는 탄닌의 결을 보는 것이 더 중요합니다.'}],tags:['레드','피에몬테','네비올로']},
{id:'solaia',name:'솔라이아',eng:'Solaia',vintage:'2015 / 2020',region:'이탈리아 토스카나 Tignanello Estate',blend:'2020 기준 70% Cabernet Sauvignon, 15% Sangiovese, 15% Cabernet Franc',style:'안티노리 플래그십 슈퍼투스칸',price:'Wine-Searcher 평균 약 40만~50만원대',profile:'카시스, 블랙체리, 바이올렛, 시더, 담배, 흑연, 정교한 탄닌과 긴 여운이 중심입니다.',key:'파워는 크지만 투스카니 특유의 산도와 구조가 살아 있어 나파 카베르네와 결이 다릅니다.',expert:[{source:'Jane Anson',score:'98',text:'정향, 세이지, 흑연, 말린 허브, 빌베리와 카시스가 어우러지고 길이감과 매력이 뛰어난 훌륭한 빈티지로 평가됩니다.'},{source:'James Suckling',score:'98',text:'커런트, 꽃, 세이지 향과 초미세 탄닌, 길고 풍미 있는 피니시가 돋보이는 세련된 와인으로 평가됩니다.'},{source:'Vinous',score:'97',text:'블랙체리, 자두, 자갈, 인센스, 스모크, 연필심 뉘앙스가 펼쳐지며, 더 클래식하고 균형 지향적인 스타일로 해석됩니다.'},{source:'빈티지 종합',score:'-',text:'토스카나 2020은 더운 조건 속에서도 상위 생산자들이 산도와 구조를 잘 보존한 해로, 솔라이아는 특히 볼륨감과 접근성, 텍스처에서 강점을 보이는 우수 빈티지로 자주 언급됩니다.'}],tags:['레드','토스카나','플래그십']},
{id:'tignanello',name:'티냐넬로',eng:'Tignanello',vintage:'2015 / 2022',region:'이탈리아 토스카나',blend:'2022 기준 78% Sangiovese, 18% Cabernet Sauvignon, 4% Cabernet Franc',style:'슈퍼투스칸 벤치마크',price:'Wine-Searcher 평균 약 22만~25만원대',profile:'검붉은 체리, 카시스, 민트, 시나몬, 그래파이트, 부드러운 질감과 생기 있는 산도가 특징입니다.',key:'산지오베제와 국제 품종 블렌딩이 만드는 균형감, 그리고 슈퍼투스칸의 기준점을 체감하기 좋습니다.',expert:[{source:'Wine Advocate 요약',score:'-',text:'2022 티냐넬로는 과실의 무게감과 벨벳 같은 질감, 부드러운 탄닌, 긴 여운이 잘 표현된 빈티지로 묘사됩니다.'},{source:'Decanter 요약',score:'-',text:'2022는 붉고 검은 베리, 미네랄, 허브, 캐시미어 같은 탄닌이 조화를 이루는 세련된 스타일로 평가됩니다.'},{source:'Galloni 코멘트 인용 요약',score:'95',text:'2022는 매우 우아하고 균형 잡힌 빈티지로 평가되며, 더운 해였지만 테루아가 잘 드러난 사례로 언급됩니다.'},{source:'빈티지 종합',score:'-',text:'토스카나 2022는 강한 더위가 있었지만, 잘 만든 와인은 힘으로 밀기보다 정제된 과실과 산도, 세련된 구조를 보여주는 해로 받아들여집니다.'}],tags:['레드','토스카나','티냐넬로']},
{id:'biserno',name:'비세르노',eng:'Biserno',vintage:'2016 / 2021',region:'이탈리아 토스카나 해안',blend:'카베르네 프랑, 메를로, 카베르네 소비뇽, 쁘띠 베르도',style:'프리미엄 보르도 블렌드',price:'Wine-Searcher 평균 약 23만~26만원대',profile:'검은 과실, 허브, 초콜릿, 부드러운 볼륨감과 긴 피니시가 조화롭습니다.',key:'볼게리 스타일보다 조금 더 유연하고 매끈한 결을 느끼기 좋습니다.',expert:[{source:'생산자 코멘트',score:'-',text:'Biserno 2021은 피네스, 볼륨감, 길이감, 신선함이 함께 공존하는 플래그십 블렌드로 소개됩니다.'},{source:'빈티지 메모',score:'-',text:'토스카나 해안 2021은 전반적으로 균형과 정밀도가 좋은 해로 평가되며, 잘 익은 과실과 세련된 탄닌을 함께 보여주기 좋습니다.'},{source:'시음 포인트',score:'-',text:'볼게리 레드보다 조금 더 매끈하고 유연한 결, 그리고 메를로가 더해주는 볼륨감을 읽어내면 이해가 쉬운 와인입니다.'}],tags:['레드','토스카나','보르도블렌드']},
{id:'fay',name:'스택스 립 와인셀라 FAY',eng:"Stag's Leap Wine Cellars FAY",vintage:'2020 / 2007',region:'미국 캘리포니아 나파 밸리',blend:'카베르네 소비뇽 중심',style:'나파 카베르네',price:'Wine-Searcher 평균 약 22만~25만원대',profile:'붉은 과실, 실키한 질감, 우아한 오크와 부드러운 구조가 특징입니다.',key:'같은 나파라도 더 섬세하고 유연한 스타일이라 S.L.V.나 CASK 23 전 단계에 좋습니다.',expert:[{source:'Wine Advocate / Dunnuck 요약',score:'-',text:'2020 FAY는 체리, 카시스, 플로럴 스파이스, 허브, 실키한 탄닌이 돋보이는 우아한 스타일로 소개됩니다.'},{source:'빈티지 메모',score:'-',text:'나파 2020은 매우 어려운 해였지만, FAY는 더운 시즌이 준 익은 과실 톤과 자연스러운 농축 덕분에 상대적으로 매력적인 결과물로 평가됩니다.'},{source:'지역 코멘트',score:'-',text:'FAY 빈야드는 같은 Stags Leap District 안에서도 더 향기롭고 접근성이 좋은 성향으로 알려져 있어, S.L.V.나 CASK 23보다 먼저 시음하기 좋습니다.'}],tags:['레드','나파','카베르네소비뇽']},
{id:'cask23',name:'스택스 립 와인셀라 CASK 23',eng:"Stag's Leap Wine Cellars CASK 23",vintage:'2021 / 2010',region:'미국 캘리포니아 나파 밸리',blend:'카베르네 소비뇽 중심 블렌드',style:'나파 아이콘 레드',price:'Wine-Searcher 평균 약 42만~48만원대',profile:'짙은 검은 과실, 강한 집중도, 길고 깊은 피니시가 핵심입니다.',key:'후반부 피크 와인으로 두기 좋은 응축도와 존재감이 있습니다.',expert:[{source:'Wine Advocate / Jeb Dunnuck',score:'-',text:'2021 CASK 23은 FAY의 향기와 S.L.V.의 구조를 결합한 와인으로, 진한 블랙 과실, 담배, 바이올렛, 흑연, 정교한 탄닌이 강조됩니다.'},{source:'빈티지 메모',score:'-',text:'나파 2021은 매우 우수한 해로 평가되며, 농도와 균형, 산도, 숙성 잠재력이 모두 높은 수준으로 거론됩니다.'},{source:'시음 포인트',score:'-',text:'이 와인은 단순히 가장 진한 레드라기보다, 두 포도원의 개성이 얼마나 매끄럽게 통합되는지를 보는 것이 핵심입니다.'}],tags:['레드','나파','아이콘']},
{id:'slv',name:'스택스 립 와인셀라 S.L.V.',eng:"Stag's Leap Wine Cellars S.L.V.",vintage:'2016',region:'미국 캘리포니아 나파 밸리',blend:'카베르네 소비뇽',style:'나파 싱글 빈야드',price:'Wine-Searcher 평균 약 33만~38만원대',profile:'검은 과실, 바이올렛, 흙, 그래파이트, 촘촘한 구조가 보입니다.',key:'1976 파리의 심판 계보라는 스토리까지 함께 공부하기 좋은 와인입니다.',expert:[{source:'스타일 코멘트',score:'94',text:'2016 S.L.V.는 코코아, 그래파이트, 블랙베리, 베이킹 스파이스와 함께 더 타이트하고 집중된 구조를 보여주는 스타일로 평가됩니다.'},{source:'빈티지 메모',score:'-',text:'나파 2016은 전반적으로 매우 우수한 카베르네 빈티지로 평가되며, 농도와 균형, 숙성 잠재력이 특히 좋다고 여겨집니다.'},{source:'지역 코멘트',score:'-',text:'S.L.V.는 FAY보다 더 구조적이고 미네랄한 결을 보이기 쉬워, 같은 생산자 안에서도 사이트 차이를 비교하기 좋은 병입니다.'}],tags:['레드','나파','싱글빈야드']},
{id:'albis',name:'하라스 데 피르케 알비스',eng:'Haras de Pirque Albis',vintage:'2002 / 2021',region:'칠레 마이포',blend:'카베르네 소비뇽, 카르메네르',style:'칠레 프리미엄 레드 블렌드',price:'Wine-Searcher 평균 약 7만~9만원대',profile:'검은 과실, 허브, 스파이스, 부드러운 구조와 균형감이 장점입니다.',key:'가격 대비 높은 완성도로, 신세계 보르도 블렌드 비교축으로 좋습니다.',expert:[{source:'Wine Spectator / Vinous 메모',score:'-',text:'Albis 2021은 흑연, 초콜릿, 자두, 민트, 발사믹 노트가 어우러지는 구조적인 칠레 프리미엄 블렌드 스타일로 소개됩니다.'},{source:'빈티지 메모',score:'-',text:'마이포 2021은 과실의 성숙도와 신선함이 좋은 균형을 보인 해로, 카베르네 소비뇽과 카르메네르 조합의 장점이 비교적 또렷하게 드러나기 좋습니다.'},{source:'지역 코멘트',score:'-',text:'안데스의 서늘한 영향 덕분에 칠레 레드 특유의 허브감과 카베르네 구조가 살아 있어, 토스카나·나파와 비교하기 좋은 신세계 축입니다.'}],tags:['레드','칠레','카르메네르']},
{id:'pitio',name:'하라스 데 피르케 피티오',eng:'Haras de Pirque Pitio',vintage:'2023',region:'칠레',blend:'현장 라벨명 재확인 필요',style:'리스트 표기 확인 필요',price:'Wine-Searcher 기준 / 라벨 확인 후 보정 권장',profile:'첨부 리스트 표기상 존재하나 실제 제품명과 라벨 표기 재확인이 필요합니다.',key:'현장에서 병 라벨을 확인한 뒤 정확한 상세 정보를 보강하는 것이 좋습니다.',expert:[{source:'생산자 코멘트',score:'-',text:'Pitío는 카베르네 소비뇽에 소량의 카베르네 프랑을 더한 와인으로, 검은 과실과 숲바닥, 담배, 민트, 월계수, 페퍼 노트가 특징으로 소개됩니다.'},{source:'빈티지 메모',score:'-',text:'하라스 데 피르케 자료에 따르면 첫 빈티지는 서늘한 3월과 큰 일교차 덕분에 신선한 과실 향과 균형 잡힌 숙도를 확보한 해였습니다.'},{source:'지역 코멘트',score:'-',text:'이 와인은 아직 정보 축적이 많지 않지만, 마이포의 허브감과 신선함을 살린 신세대 스타일로 이해하면 시음 포인트를 잡기 쉽습니다.'}],tags:['확인필요','칠레']}];
const state = { allNotes: [], openedId: null };
const wineGrid=document.getElementById('wineGrid');
const searchInput=document.getElementById('search');
const themeBtn=document.getElementById('themeBtn');
function escapeHtml(str=''){return String(str).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
function formatDate(value){if(!value) return ''; const d=new Date(value); if(Number.isNaN(d.getTime())) return String(value); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function getWineNotes(wineId){return state.allNotes.filter(n=>n.wineId===wineId).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));}
function getAverageScore(wineId){const notes=getWineNotes(wineId).filter(n=>!isNaN(Number(n.score))); if(!notes.length) return null; return (notes.reduce((s,n)=>s+Number(n.score),0)/notes.length).toFixed(1);}
async function fetchNotes(){const res=await fetch(CONFIG.API_URL); if(!res.ok) throw new Error('불러오기 실패'); const data=await res.json(); state.allNotes=Array.isArray(data)?data:[];}
async function saveNote(payload){const body=new URLSearchParams({wineId:payload.wineId,wineName:payload.wineName,userName:payload.userName,score:payload.score,comment:payload.comment}); const res=await fetch(CONFIG.API_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:body.toString()}); if(!res.ok) throw new Error('저장 실패'); return res.text();}
async function deleteNote(payload){const body=new URLSearchParams({action:'delete',wineId:payload.wineId,userName:payload.userName,score:payload.score,comment:payload.comment,timestamp:payload.timestamp||''}); const res=await fetch(CONFIG.API_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:body.toString()}); if(!res.ok) throw new Error('삭제 실패'); return res.text();}
function scoreToStars(score){const n=Math.max(0,Math.min(10,Number(score)||0)); const full=Math.floor(n/2); const half=n%2; let html='<span class="stars" aria-hidden="true">'; for(let i=0;i<full;i++) html+='<span class="star-full"></span>'; if(half) html+='<span class="star-half"></span>'; for(let i=0;i<5-full-half;i++) html+='<span class="star-empty"></span>'; html+='</span>'; return html;}
function renderScoreLabel(score){return `${scoreToStars(score)} <span>${escapeHtml(score)}/10</span>`;}
function scoreOptionLabel(score){const labels={1:'0.5점',2:'1점',3:'1.5점',4:'2점',5:'2.5점',6:'3점',7:'3.5점',8:'4점',9:'4.5점',10:'5점'}; return labels[score]||`${score}/10`;}
function renderChatList(wineId){const notes=getWineNotes(wineId); if(!notes.length) return '<div class="chat-empty">아직 남겨진 시음평이 없습니다. 첫 코멘트를 남겨보세요.</div>'; return notes.map((note,idx)=>`<div class="chat-item"><div class="chat-meta"><div><div class="chat-user">${escapeHtml(note.userName||'')}</div><div class="chat-time">${escapeHtml(formatDate(note.timestamp))}</div></div><div class="chat-score">${renderScoreLabel(note.score)}</div></div><div class="chat-text">${escapeHtml(note.comment||'')}</div><div class="chat-item-actions"><button type="button" class="delete-note-btn" data-delete-note="${wineId}|${idx}">삭제</button></div></div>`).join('');}
function detailHTML(w,status=''){const avg=getAverageScore(w.id); return `<div class="headline"><div><h3>${w.name}</h3><div class="sub">${w.eng}</div></div><div class="vintage">빈티지 ${w.vintage}</div></div><div class="section"><div class="kv"><div class="k">산지</div><div>${w.region}</div><div class="k">블렌딩</div><div>${w.blend}</div><div class="k">스타일</div><div>${w.style}</div><div class="k">참고가</div><div>${w.price}</div></div></div><div class="section"><h4>핵심 특징</h4><div class="note">${w.profile}</div></div><div class="section"><h4>공부 포인트</h4><div class="note">${w.key}</div></div><div class="section"><h4>전문가 평가 / 빈티지 코멘트</h4>${w.expert.map(q=>`<div class="quote"><strong>${q.source}${q.score !== '-' ? ' · '+q.score+'점' : ''}</strong><p>${q.text}</p></div>`).join('')}</div><div class="chat-wrap"><div class="chat-top"><h4>참석자 시음평</h4><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;"><div class="avg-badge">${avg ? `평균 ${scoreToStars(Math.round(Number(avg)))} ${avg}/10 · ${getWineNotes(w.id).length}명` : '아직 평점 없음'}</div>${status ? `<div class="status-badge ${status.includes('실패') ? 'error' : ''}">${escapeHtml(status)}</div>`:''}</div></div><div class="chat-list">${renderChatList(w.id)}</div><form class="chat-form" data-wine-form="${w.id}"><div class="form-row"><select class="field" name="user" required><option value="">평가자</option><option value="허의지">허의지</option><option value="허의성">허의성</option><option value="박서이">박서이</option></select></div><input type="hidden" name="score" value="" /><div class="rating-select-wrap"><button type="button" class="rating-trigger"><span class="rating-trigger-text">평점을 선택하세요</span><span>▾</span></button><div class="rating-panel">${Array.from({length:10},(_,i)=>{const score=i+1; return `<button type="button" class="star-btn" data-score="${score}"><span class="star-visual">${scoreToStars(score)}</span><span class="star-text">${scoreOptionLabel(score)}</span></button>`;}).join('')}</div></div><textarea class="textarea" name="text" placeholder="향, 산도, 질감, 여운, 음식 페어링 인상 등을 자유롭게 남겨보세요." maxlength="300" required></textarea><div class="chat-actions"><div class="helper">실제 시트에 저장됩니다.</div><button class="submit-btn" type="submit">시음평 남기기</button></div></form></div>`;}
function bindChatForms(){document.querySelectorAll('[data-wine-form]').forEach(form=>{if(form.dataset.bound==='true') return; form.dataset.bound='true'; const hiddenScore=form.querySelector('input[name="score"]'); const trigger=form.querySelector('.rating-trigger'); const triggerText=form.querySelector('.rating-trigger-text'); const panel=form.querySelector('.rating-panel'); if(trigger){trigger.addEventListener('click',()=>{panel.classList.toggle('open'); trigger.classList.toggle('active');});} form.querySelectorAll('.star-btn').forEach(btn=>btn.addEventListener('click',()=>{form.querySelectorAll('.star-btn').forEach(el=>el.classList.remove('active')); btn.classList.add('active'); hiddenScore.value=btn.dataset.score; if(triggerText) triggerText.innerHTML=`${scoreToStars(btn.dataset.score)} <span>${btn.dataset.score}/10</span>`; if(panel) panel.classList.remove('open'); if(trigger) trigger.classList.remove('active');})); form.addEventListener('submit',async e=>{e.preventDefault(); const wineId=form.getAttribute('data-wine-form'); const wine=wines.find(v=>v.id===wineId); const userName=form.user.value.trim(); const score=form.score.value; const comment=form.text.value.trim(); const submitBtn=form.querySelector('.submit-btn'); const detail=form.closest('.detail-inline'); if(!userName||!score||!comment) return; submitBtn.disabled=true; submitBtn.textContent='저장 중...'; try{await saveNote({wineId,wineName:wine.name,userName,score,comment}); await fetchNotes(); detail.innerHTML=detailHTML(wine,'저장되었습니다.'); bindChatForms(); bindDeleteButtons();}catch(err){detail.innerHTML=detailHTML(wine,'저장 실패'); bindChatForms(); bindDeleteButtons();}});});}
function bindDeleteButtons(){document.querySelectorAll('[data-delete-note]').forEach(btn=>{if(btn.dataset.bound==='true') return; btn.dataset.bound='true'; btn.addEventListener('click',async()=>{const [wineId,idx]=btn.dataset.deleteNote.split('|'); const notes=getWineNotes(wineId); const note=notes[Number(idx)]; if(!note) return; if(!confirm('이 시음평을 삭제할까요?')) return; const wine=wines.find(v=>v.id===wineId); const detail=btn.closest('.detail-inline'); try{await deleteNote({wineId,userName:note.userName,score:note.score,comment:note.comment,timestamp:note.timestamp}); await fetchNotes(); detail.innerHTML=detailHTML(wine,'삭제되었습니다.'); bindChatForms(); bindDeleteButtons();}catch(err){detail.innerHTML=detailHTML(wine,'삭제 실패'); bindChatForms(); bindDeleteButtons();}});});}
function renderList(filter=''){wineGrid.innerHTML=''; const filtered=wines.filter(w=>[w.name,w.eng,w.region,w.blend,...(w.tags||[])].join(' ').toLowerCase().includes(filter.toLowerCase())); if(!filtered.length){wineGrid.innerHTML='<div class="note">검색 결과가 없습니다.</div>'; state.state.openedId=null; return;} filtered.forEach((wine,idx)=>{const wrap=document.createElement('div'); wrap.className='wine-card'; const item=document.createElement('button'); item.type='button'; item.className='wine-item'; item.dataset.id=wine.id; item.innerHTML=`<h3>${wine.name}</h3><p>${wine.eng}</p><p>${wine.vintage} · ${wine.region}</p><div class="chips">${wine.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div>`; const detail=document.createElement('div'); detail.className='detail-inline'; detail.innerHTML=detailHTML(wine); item.addEventListener('click',()=>{const isSame=state.openedId===wine.id; document.querySelectorAll('.wine-item').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.detail-inline').forEach(el=>el.classList.remove('open')); if(isSame){state.openedId=null; return;} item.classList.add('active'); detail.classList.add('open'); openedId=wine.id; bindChatForms(); bindDeleteButtons();}); wrap.appendChild(item); wrap.appendChild(detail); wineGrid.appendChild(wrap); if(idx===0 && !state.openedId){item.classList.add('active'); detail.classList.add('open'); state.openedId=wine.id;}}); bindChatForms();}
searchInput.addEventListener('input',e=>{state.openedId=null; renderList(e.target.value);});
async function init(){try{await fetchNotes();}catch(e){state.allNotes=[];} renderList();}
init();
themeBtn.addEventListener('click',()=>{const html=document.documentElement; const next=html.getAttribute('data-theme')==='dark'?'light':'dark'; html.setAttribute('data-theme',next); themeBtn.textContent=next==='dark'?'라이트 모드 전환':'다크모드';});
</script>
</body>
</html>
