<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>안티노리 First Class 대시보드</title>
    <!-- version: clean-v1 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f1eb;
        --surface: #fffdfa;
        --surface-2: #efe8df;
        --line: #ded4c7;
        --text: #211b15;
        --muted: #6f665c;
        --accent: #7a2e38;
        --chip: #f1e7da;
        --good: #6b4a2f;
        --danger: #a33b3b;
        --radius: 14px;
        --shadow: 0 10px 26px rgba(44, 32, 22, 0.06);
      }

      [data-theme="dark"] {
        --bg: #151210;
        --surface: #211b17;
        --surface-2: #2a231e;
        --line: #3f352d;
        --text: #f3ece4;
        --muted: #b8ab9e;
        --accent: #c48a92;
        --chip: #302822;
        --good: #b99674;
        --danger: #de8f8f;
        --shadow: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans KR", sans-serif;
        background: linear-gradient(180deg, var(--bg), var(--surface-2));
        color: var(--text);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 10px;
      }

      .toolbar {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .toolbar-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .page-badge {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        padding: 7px 10px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: calc(100% - 96px);
      }

      .theme-btn,
      .tab-btn,
      .ghost-btn,
      .submit-btn {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        padding: 9px 12px;
        border-radius: 999px;
      }

      .theme-btn {
        min-width: 84px;
        padding: 8px 10px;
        font-size: 12px;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .tab-btn {
        text-align: center;
        font-size: 13px;
      }

      .tab-btn.active {
        background: #7a2e38;
        color: #fff;
        border-color: transparent;
      }

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
      }

      .card {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      [data-theme="dark"] .card {
        background: rgba(33, 27, 23, 0.94);
      }

      .intro {
        padding: 14px;
        margin-bottom: 10px;
      }

      .intro h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.45;
      }

      .intro p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .section-card {
        padding: 12px;
        margin-bottom: 10px;
      }

      .section-title {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .search {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
        margin-bottom: 10px;
      }

      .wine-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .wine-card {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .wine-item {
        width: 100%;
        text-align: left;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
      }

      .wine-item.active {
        border-color: #7a2e38;
        box-shadow: 0 6px 16px rgba(80, 40, 20, 0.06);
      }

      .wine-item h3 {
        margin: 0 0 3px;
        font-size: 14px;
        color: #7a2e38 !important;
      }

      .wine-item p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .chips {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .chip {
        display: inline-flex;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 10px;
        color: #7a2e38 !important;
      }

      .detail-inline {
        display: none;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
      }

      .detail-inline.open {
        display: block;
      }

      .headline {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 8px;
        flex-direction: column;
      }

      .headline h3 {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
      }

      .sub {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .vintage {
        padding: 5px 9px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 11px;
        white-space: nowrap;
      }

      .section {
        margin-top: 10px;
      }

      .section h4 {
        margin: 0 0 6px;
        font-size: 13px;
        color: #7a2e38;
      }

      .kv {
        display: grid;
        grid-template-columns: 78px 1fr;
        gap: 4px 10px;
        font-size: 12px;
      }

      .kv div {
        padding: 6px 0;
        border-bottom: 1px solid var(--line);
      }

      .k {
        color: var(--muted);
      }

      .note,
      .quote,
      .chat-wrap,
      .blind-box,
      .score-box {
        padding: 10px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .quote {
        margin-bottom: 8px;
      }

      .quote strong {
        display: block;
        font-size: 12px;
        margin-bottom: 3px;
      }

      .quote p,
      .note {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      .chat-wrap {
        margin-top: 10px;
      }

      .chat-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .chat-top h4 {
        margin: 0;
        font-size: 13px;
        color: #7a2e38;
      }

      .avg-badge,
      .status-badge {
        padding: 6px 9px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 11px;
      }

      .status-badge.error {
        color: var(--danger);
      }

      .chat-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 10px;
        max-height: 260px;
        overflow: auto;
      }

      .chat-empty,
      .blind-empty {
        padding: 10px;
        border: 1px dashed var(--line);
        border-radius: 10px;
        color: var(--muted);
        font-size: 12px;
        background: var(--surface);
      }

      .chat-item {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
      }

      .chat-meta {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        margin-bottom: 5px;
        flex-wrap: wrap;
      }

      .chat-user {
        font-size: 12px;
        font-weight: 700;
      }

      .chat-time {
        font-size: 10px;
        color: var(--muted);
      }

      .chat-score {
        font-size: 11px;
        color: #7a2e38;
        background: var(--chip);
        padding: 4px 7px;
        border-radius: 999px;
      }

      .chat-text {
        font-size: 12px;
        line-height: 1.55;
        color: var(--muted);
        white-space: pre-wrap;
      }

      .chat-item-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 8px;
      }

      .delete-note-btn {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        padding: 5px 8px;
        border-radius: 999px;
        font-size: 11px;
      }

      .chat-form,
      .blind-form {
        display: grid;
        gap: 8px;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .field,
      .textarea {
        width: 100%;
        padding: 10px 11px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
      }

      .textarea {
        min-height: 76px;
        resize: vertical;
      }

      .chat-actions,
      .blind-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .submit-btn {
        background: #7a2e38;
        color: #fff;
        border-color: transparent;
      }

      .helper {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.45;
      }

      .rating-panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .rate-btn {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        padding: 9px 8px;
        font-size: 11px;
      }

      .rate-btn.active {
        border-color: #7a2e38;
        background: var(--chip);
      }

      .blind-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .blind-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .blind-item {
        width: 100%;
        text-align: left;
        padding: 11px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
      }

      .blind-item.active {
        border-color: #7a2e38;
        background: var(--chip);
      }

      .blind-item h4 {
        margin: 0 0 3px;
        font-size: 14px;
      }

      .blind-item p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .blind-header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: flex-start;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .blind-stats {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        width: 100%;
      }

      .score-box {
        flex: 1;
        min-width: 100px;
      }

      .score-box strong {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 2px;
      }

      .score-box span {
        font-size: 16px;
        font-weight: 800;
      }

      @media (min-width: 761px) {
        .wrap {
          max-width: 980px;
          padding: 16px;
        }

        .wine-grid {
          grid-template-columns: 1fr 1fr;
        }

        .form-row {
          grid-template-columns: 1fr 1fr;
        }

        .rating-panel {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        .blind-layout {
          grid-template-columns: 280px 1fr;
        }

        .headline {
          flex-direction: row;
        }

        .blind-stats {
          width: auto;
        }

        .intro h1 {
          font-size: 18px;
        }

        .section-title {
          font-size: 18px;
        }

        .tabs {
          grid-template-columns: auto auto;
          justify-content: start;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="toolbar">
        <div class="toolbar-main">
          <div class="page-badge">
            🍷 안티노리 First Class 대시보드
          </div>
          <button type="button" id="themeBtn" class="theme-btn">
            다크모드
          </button>
        </div>
        <div class="tabs">
          <button
            type="button"
            class="tab-btn active"
            data-tab-target="mainPanel"
          >
            Tasting Notes
          </button>
          <button
            type="button"
            class="tab-btn"
            data-tab-target="blindPanel"
          >
            Blind Tasting
          </button>
        </div>
      </div>

      <section id="mainPanel" class="panel active">
        <section class="card intro">
          <h1>
            와인을 누르면 상세정보를 확인하고 시음평을 바로 남길 수
            있어요.
          </h1>
          <p></p>
        </section>

        <section class="card section-card">
          <h2 class="section-title">Wine List</h2>
          <input
            id="search"
            class="search"
            placeholder="와인명, 산지, 품종으로 검색"
          />
          <div id="wineGrid" class="wine-grid"></div>
        </section>
      </section>

      <section id="blindPanel" class="panel">
        <section class="card intro">
          <h1>
            블라인드테이스팅은 정답 없이 관찰과 추측을 기록하는 방식으로
            구성했습니다.
          </h1>
          <p>
            Flight를 선택하고 안티노리 수입 포트폴리오 기준 드롭다운과
            메모를 이용해 참가자별 기록을 남길 수 있어요.
          </p>
        </section>

        <section class="card section-card blind-layout">
          <div>
            <div class="blind-header">
              <div>
                <h2 class="section-title" style="margin-bottom: 4px">
                  Blind Flights
                </h2>
                <div class="helper">
                  기존 Wine List와 별도로 운영됩니다.
                </div>
              </div>
            </div>
            <div id="blindList" class="blind-list"></div>
          </div>

          <div>
            <div class="blind-header">
              <div>
                <div
                  style="
                    display: flex;
                    gap: 8px;
                    flex-wrap: wrap;
                    align-items: center;
                    margin-bottom: 4px;
                  "
                >
                  <h2
                    id="blindSelected"
                    class="section-title"
                    style="margin: 0"
                  >
                    Flight 1
                  </h2>
                  <button
                    type="button"
                    id="editFlightOneBtn"
                    class="ghost-btn"
                    style="padding: 7px 10px; font-size: 11px"
                  >
                    Flight 1 이름 변경
                  </button>
                </div>
                <div class="helper">
                  참가자별 블라인드 기록을 현재 시트에 저장합니다.
                </div>
              </div>

              <div class="blind-stats">
                <div class="score-box">
                  <strong>Saved Flights</strong>
                  <span id="blindSolved">0</span>
                </div>
                <div class="score-box">
                  <strong>Latest Check</strong>
                  <span id="blindScore">0</span>
                </div>
              </div>
            </div>

            <div id="blindDetail"></div>
          </div>
        </section>
      </section>
    </div>

    <script>

      function escapeHtml(str = "") {
        return String(str).replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[ch]);
      }

      function formatDate(value) {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(
          2,
          "0"
        )}.${String(d.getDate()).padStart(2, "0")} ${String(
          d.getHours()
        ).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
      }

      function scoreOptionLabel(score) {
        const labels = {
          1: "Below Acceptable",
          2: "Acceptable",
          3: "Good",
          4: "Very Good",
          5: "Outstanding",
        };
        return labels[score] || String(score);
      }

      function getWineNotes(wineId) {
        return state.allNotes
          .filter((n) => n.wineId === wineId)
          .sort(
            (a, b) => new Date(b.timestamp) - new Date(a.timestamp)
          );
      }

      function getBlindNotes(flightId) {
        return state.blindNotes
          .filter((n) => n.flightId === flightId)
          .sort(
            (a, b) => new Date(b.timestamp) - new Date(a.timestamp)
          );
      }

      function getAverageScore(wineId) {
        const notes = getWineNotes(wineId).filter(
          (n) => !Number.isNaN(Number(n.score))
        );
        if (!notes.length) return null;
        return (
          notes.reduce(
            (sum, n) => sum + Number(n.score),
            0
          ) / notes.length
        ).toFixed(1);
      }

      function getBlindLabel(item) {
        return state.blindLabels[item.id] || item.code;
      }

      function renderSelectOptions(options, placeholder) {
        return [
          `<option value="">${placeholder}</option>`,
        ]
          .concat(
            options.map(

                `<option value="${escapeHtml(
                  option
                )}">${escapeHtml(option)}</option>`
            )
          )
          .join("");
      }

      function scoreBlindGuess(form) {
        let total = 0;
        ["producer", "wine", "country", "region", "variety", "vintage"].forEach(
          (name) => {
            if (form[name] && String(form[name].value).trim()) {
              total += 1;
            }
          }
        );
        return total;
      }

      async function saveNote(payload) {
        const body = new URLSearchParams(payload);
        const res = await fetch(CONFIG.API_URL, {
          method: "POST",
          headers: {
            "Content-Type":
              "application/x-www-form-urlencoded;charset=UTF-8",
          },
          body: body.toString(),
        });
        if (!res.ok) throw new Error("save");
        return res.text();
      }

      async function deleteNote(payload) {
        const body = new URLSearchParams({
          action: "delete",

            "Content-Type":
              "application/x-www-form-urlencoded;charset=UTF-8",

      function renderWineList(filter = "") {
        wineGrid.innerHTML = "";

        const filtered = wines.filter((w) =>
          [w.name, w.eng, w.region, w.blend, ...(w.tags || [])]
            .join(" ")
            .toLowerCase()
            .includes(filter.toLowerCase())
        );

        if (!filtered.length) {
          wineGrid.innerHTML =
            '<div class="note">검색 결과가 없습니다.</div>';
          return;
        }

        filtered.forEach((wine, index) => {
          const wrap = document.createElement("div");
          wrap.className = "wine-card";

          const item = document.createElement("button");
          item.type = "button";
          item.className = "wine-item";
          item.innerHTML = `
            <h3>${wine.name}</h3>
            <p>${wine.eng}</p>
            <p>${wine.vintage} · ${wine.region}</p>
            <div class="chips">
              ${wine.tags
                .map((tag) => `<span class="chip">${tag}</span>`)
                .join("")}
            </div>
          `;

          const detail = document.createElement("div");
          detail.className = "detail-inline";
          detail.innerHTML = detailHTML(wine);

          item.addEventListener("click", () => {
            const alreadyOpen = detail.classList.contains("open");

            document
              .querySelectorAll(".wine-item")
              .forEach((el) => el.classList.remove("active"));
            document
              .querySelectorAll(".detail-inline")
              .forEach((el) => el.classList.remove("open"));

            if (alreadyOpen) {
              state.openedWineId = null;
              return;
            }

            item.classList.add("active");
            detail.classList.add("open");
            state.openedWineId = wine.id;

            bindWineFormEvents();
            bindDeleteButtons();
          });

          wrap.appendChild(item);
          wrap.appendChild(detail);
          wineGrid.appendChild(wrap);

          const shouldOpen =
            state.openedWineId === wine.id ||
            (!state.openedWineId && index === 0);

          if (shouldOpen) {
            item.classList.add("active");
            detail.classList.add("open");
            state.openedWineId = wine.id;
          }
        });

        bindWineFormEvents();
        bindDeleteButtons();
      }

      function bindWineFormEvents() {
        document
          .querySelectorAll("[data-wine-form]")
          .forEach((form) => {
            if (form.dataset.bound === "true") return;
            form.dataset.bound = "true";

            const hiddenScore = form.querySelector(
              'input[name="score"]'
            );

            form
              .querySelectorAll(".rate-btn")
              .forEach((btn) => {
                btn.addEventListener("click", () => {
                  form
                    .querySelectorAll(".rate-btn")
                    .forEach((el) =>
                      el.classList.remove("active")
                    );
                  btn.classList.add("active");
                  hiddenScore.value = btn.dataset.score;
                });
              });

            form.addEventListener("submit", async (e) => {
              e.preventDefault();
              const wineId = form.dataset.wineForm;
              const wine = wines.find((v) => v.id === wineId);

              const userName = form.user.value.trim();
              const score = form.score.value.trim();
              const comment = form.text.value.trim();

              if (!userName || !score || !comment) return;

              try {
                await saveNote({
                  wineId,
                  wineName: wine.name,
                  userName,
                  score,
                  comment,
                });
                await fetchNotes();
                renderWineList(searchInput.value);
              } catch (err) {
                const detail = form.closest(".detail-inline");
                if (detail) {
                  detail.innerHTML = detailHTML(
                    wine,
                    "저장 실패"
                  );
                  bindWineFormEvents();
                  bindDeleteButtons();
                }
              }
            });
          });
      }

      function bindDeleteButtons() {
        document
          .querySelectorAll("[data-delete-note]")
          .forEach((btn) => {
            if (btn.dataset.bound === "true") return;
            btn.dataset.bound = "true";

            btn.addEventListener("click", async () => {
              const [wineId, idx] = btn.dataset.deleteNote.split(
                "|"
              );
              const note = getWineNotes(wineId)[Number(idx)];
              const wine = wines.find((v) => v.id === wineId);

              if (!note) return;
              if (!window.confirm("삭제하시겠습니까?")) return;

              try {
                await deleteNote({
                  wineId,
                  userName: note.userName,
                  score: note.score,
                  comment: note.comment,
                  timestamp: note.timestamp || "",
                });
                await fetchNotes();
                renderWineList(searchInput.value);
              } catch (err) {
                const detail = btn.closest(".detail-inline");
                if (detail) {
                  detail.innerHTML = detailHTML(
                    wine,
                    "삭제 실패"
                  );
                  bindWineFormEvents();
                  bindDeleteButtons();
                }
              }
            });
          });
      }

                class="textarea"
                name="memo"
                placeholder="아로마, 산도, 바디, 오크, 구조감, 음식 페어링 추측 등을 메모하세요."
              ></textarea>

              <div class="blind-actions">
                <button type="button" id="saveBlindBtn" class="submit-btn">
                  기록 저장
                </button>
                <button type="reset" class="ghost-btn">
                  초기화
                </button>
              </div>
              <div id="blindStatus" class="helper">
                참가자별 블라인드 기록을 현재 시트의 blind_notes 시트에 저장합니다.
              </div>
            </form>

            <div class="note" style="margin-top:8px;">
              <strong>입력 체크</strong><br />
              <span id="blindScoreText">
                생산자, 국가, 지역, 품종/블렌딩, 빈티지, 메모를 기록하면서 블라인드 노트를 정리하세요.
              </span>
            </div>
          </div>
        `;

        const form = document.getElementById("blindForm");
        const status = document.getElementById("blindStatus");
        const scoreText = document.getElementById("blindScoreText");

        document
          .getElementById("saveBlindBtn")
          .addEventListener("click", async () => {
            const userName = form.user.value.trim();
            if (!userName) {
              status.textContent = "평가자를 선택해 주세요.";
              return;
            }

            const pts = scoreBlindGuess(form);
            status.textContent = "저장 중...";

            try {
              await saveBlindNote({
                flightId: item.id,
                flightName: getBlindLabel(item),
                userName,
                producerGuess: form.producer.value.trim(),
                wineGuess: form.wine.value.trim(),
                countryGuess: form.country.value.trim(),
                regionGuess: form.region.value.trim(),
                varietyGuess: form.variety.value.trim(),
                vintageGuess: form.vintage.value.trim(),
                memo: form.memo.value.trim(),
                score: String(pts),
              });

              await fetchBlindNotes();
              state.latestBlindScore = pts;
              state.blindSavedFlights.add(item.id);

              document.getElementById(
                "blindScore"
              ).textContent = String(pts);
              document.getElementById(
                "blindSolved"
              ).textContent = String(
                state.blindSavedFlights.size
              );

              scoreText.textContent = `입력 항목 체크: ${pts} / 6`;
              status.textContent = "블라인드 기록이 저장되었습니다.";

              renderBlindDetail(item);
            } catch (err) {
              status.textContent = "블라인드 기록 저장 실패";
            }
          });
      }

      function renderBlindList() {
        const list = document.getElementById("blindList");
        list.innerHTML = "";

        blindWines.forEach((item) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `blind-item ${
            item.id === state.blindActiveId ? "active" : ""
          }`;
          btn.innerHTML = `
            <h4>${getBlindLabel(item)}</h4>
            <p>${item.clue}</p>
          `;
          btn.addEventListener("click", () => {
            state.blindActiveId = item.id;
            renderBlindSection();
          });
          list.appendChild(btn);
        });
      }

      function renderBlindSection() {
        renderBlindList();

        const active =
          blindWines.find(
            (item) => item.id === state.blindActiveId
          ) || blindWines[0];

        document.getElementById(
          "blindSelected"
        ).textContent = getBlindLabel(active);
        document.getElementById(
          "blindSolved"
        ).textContent = String(state.blindSavedFlights.size);
        document.getElementById(
          "blindScore"
        ).textContent = String(state.latestBlindScore);

        renderBlindDetail(active);

        const editBtn = document.getElementById("editFlightOneBtn");
        if (editBtn) {
          editBtn.onclick = () => {
            const next = window.prompt(
              "Flight 1 이름을 입력하세요.",
              state.blindLabels["blind-1"] || "Flight 1"
            );
            if (next && next.trim()) {
              state.blindLabels["blind-1"] = next.trim();
              renderBlindSection();
            }
          };
        }
      }

      function bindTabs() {
        document
          .querySelectorAll("[data-tab-target]")
          .forEach((btn) => {
            btn.addEventListener("click", () => {
              const target = btn.dataset.tabTarget;

              document
                .querySelectorAll(".tab-btn")
                .forEach((el) =>
                  el.classList.remove("active")
                );
              document
                .querySelectorAll(".panel")
                .forEach((panel) =>
                  panel.classList.remove("active")
                );

              btn.classList.add("active");
              document
                .getElementById(target)
                .classList.add("active");

              if (target === "blindPanel") {
                renderBlindSection();
              }
            });
          });
      }

      searchInput.addEventListener("input", (e) => {
        state.openedWineId = null;
        renderWineList(e.target.value);
      });

      themeBtn.addEventListener("click", () => {
        const root = document.documentElement;
        const next =
          root.getAttribute("data-theme") === "dark"
            ? "light"
            : "dark";
        root.setAttribute("data-theme", next);
        themeBtn.textContent =
          next === "dark" ? "라이트모드" : "다크모드";
      });

      async function init() {
        try {
          await fetchNotes();
        } catch (err) {
          state.allNotes = [];
        }

        try {
          await fetchBlindNotes();
        } catch (err) {
          state.blindNotes = [];
          state.blindSavedFlights = new Set();
        }

        bindTabs();
        renderWineList();
        renderBlindSection();
      }

      init();
    </script>
  </body>
</html>
