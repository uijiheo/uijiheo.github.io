<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>안티노리 First Class 대시보드</title>
    <!-- version: clean-v3 with critic scores -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f1eb;
        --surface: #fffdfa;
        --surface-2: #efe8df;
        --line: #ded4c7;
        --text: #211b15;
        --muted: #6f665c;
        --accent: #7a2e38;
        --chip: #f1e7da;
        --good: #6b4a2f;
        --danger: #a33b3b;
        --radius: 14px;
        --shadow: 0 10px 26px rgba(44, 32, 22, 0.06);
      }

      [data-theme="dark"] {
        --bg: #151210;
        --surface: #211b17;
        --surface-2: #2a231e;
        --line: #3f352d;
        --text: #f3ece4;
        --muted: #b8ab9e;
        --accent: #c48a92;
        --chip: #302822;
        --good: #b99674;
        --danger: #de8f8f;
        --shadow: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans KR", sans-serif;
        background: linear-gradient(180deg, var(--bg), var(--surface-2));
        color: var(--text);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 10px;
      }

      .toolbar {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .toolbar-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .page-badge {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        padding: 7px 10px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: calc(100% - 96px);
      }

      .theme-btn,
      .tab-btn,
      .ghost-btn,
      .submit-btn {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        padding: 9px 12px;
        border-radius: 999px;
      }

      .theme-btn {
        min-width: 84px;
        padding: 8px 10px;
        font-size: 12px;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .tab-btn {
        text-align: center;
        font-size: 13px;
      }

      .tab-btn.active {
        background: #7a2e38;
        color: #fff;
        border-color: transparent;
      }

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
      }

      .card {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      [data-theme="dark"] .card {
        background: rgba(33, 27, 23, 0.94);
      }

      .intro {
        padding: 14px;
        margin-bottom: 10px;
      }

      .intro h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.45;
      }

      .intro p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .section-card {
        padding: 12px;
        margin-bottom: 10px;
      }

      .section-title {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .search {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
        margin-bottom: 10px;
      }

      .wine-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .wine-card {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .wine-item {
        width: 100%;
        text-align: left;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
      }

      .wine-item.active {
        border-color: #7a2e38;
        box-shadow: 0 6px 16px rgba(80, 40, 20, 0.06);
      }

      .wine-item h3 {
        margin: 0 0 3px;
        font-size: 14px;
        color: #7a2e38 !important;
      }

      .wine-item p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .chips {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .chip {
        display: inline-flex;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 10px;
        color: #7a2e38 !important;
      }

      .detail-inline {
        display: none;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
      }

      .detail-inline.open {
        display: block;
      }

      .headline {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 8px;
        flex-direction: column;
      }

      .headline h3 {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
      }

      .sub {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .vintage {
        padding: 5px 9px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 11px;
        white-space: nowrap;
      }

      .section {
        margin-top: 10px;
      }

      .section h4 {
        margin: 0 0 6px;
        font-size: 13px;
        color: #7a2e38;
      }

      .kv {
        display: grid;
        grid-template-columns: 78px 1fr;
        gap: 4px 10px;
        font-size: 12px;
      }

      .kv div {
        padding: 6px 0;
        border-bottom: 1px solid var(--line);
      }

      .k {
        color: var(--muted);
      }

      .note,
      .quote,
      .chat-wrap,
      .blind-box,
      .score-box {
        padding: 10px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .quote {
        margin-bottom: 8px;
      }

      .quote strong {
        display: block;
        font-size: 12px;
        margin-bottom: 3px;
      }

      .quote p,
      .note {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      .chat-wrap {
        margin-top: 10px;
      }

      .chat-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .chat-top h4 {
        margin: 0;
        font-size: 13px;
        color: #7a2e38;
      }

      .avg-badge,
      .status-badge {
        padding: 6px 9px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 11px;
      }

      .status-badge.error {
        color: var(--danger);
      }

      .chat-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 10px;
        max-height: 260px;
        overflow: auto;
      }

      .chat-empty,
      .blind-empty {
        padding: 10px;
        border: 1px dashed var(--line);
        border-radius: 10px;
        color: var(--muted);
        font-size: 12px;
        background: var(--surface);
      }

      .chat-item {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
      }

      .chat-meta {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        margin-bottom: 5px;
        flex-wrap: wrap;
      }

      .chat-user {
        font-size: 12px;
        font-weight: 700;
      }

      .chat-time {
        font-size: 10px;
        color: var(--muted);
      }

      .chat-score {
        font-size: 11px;
        color: #7a2e38;
        background: var(--chip);
        padding: 4px 7px;
        border-radius: 999px;
      }

      .chat-text {
        font-size: 12px;
        line-height: 1.55;
        color: var(--muted);
        white-space: pre-wrap;
      }

      .chat-item-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 8px;
      }

      .delete-note-btn {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        padding: 5px 8px;
        border-radius: 999px;
        font-size: 11px;
      }

      .chat-form,
      .blind-form {
        display: grid;
        gap: 8px;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .field,
      .textarea {
        width: 100%;
        padding: 10px 11px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
      }

      .textarea {
        min-height: 76px;
        resize: vertical;
      }

      .chat-actions,
      .blind-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .submit-btn {
        background: #7a2e38;
        color: #fff;
        border-color: transparent;
      }

      .helper {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.45;
      }

      .rating-panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .rate-btn {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        padding: 9px 8px;
        font-size: 11px;
        color: var(--text);
      }

      .rate-btn.active {
        border-color: #7a2e38;
        background: var(--chip);
        color: #7a2e38;
      }

      .blind-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .blind-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .blind-item {
        width: 100%;
        text-align: left;
        padding: 11px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
      }

      .blind-item.active {
        border-color: #7a2e38;
        background: var(--chip);
      }

      .blind-item h4 {
        margin: 0 0 3px;
        font-size: 14px;
      }

      .blind-item p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .blind-header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: flex-start;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .blind-stats {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        width: 100%;
      }

      .score-box {
        flex: 1;
        min-width: 100px;
      }

      .score-box strong {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 2px;
      }

      .score-box span {
        font-size: 16px;
        font-weight: 800;
      }

      @media (min-width: 761px) {
        .wrap {
          max-width: 980px;
          padding: 16px;
        }

        .wine-grid {
          grid-template-columns: 1fr 1fr;
        }

        .form-row {
          grid-template-columns: 1fr 1fr;
        }

        .rating-panel {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        .blind-layout {
          grid-template-columns: 280px 1fr;
        }

        .headline {
          flex-direction: row;
        }

        .blind-stats {
          width: auto;
        }

        .intro h1 {
          font-size: 18px;
        }

        .section-title {
          font-size: 18px;
        }

        .tabs {
          grid-template-columns: auto auto;
          justify-content: start;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="toolbar">
        <div class="toolbar-main">
          <div class="page-badge">
            🍷 안티노리 First Class 대시보드
          </div>
          <button type="button" id="themeBtn" class="theme-btn">
            다크모드
          </button>
        </div>
        <div class="tabs">
          <button
            type="button"
            class="tab-btn active"
            data-tab-target="mainPanel"
          >
            Tasting Notes
          </button>
          <button
            type="button"
            class="tab-btn"
            data-tab-target="blindPanel"
          >
            Blind Tasting
          </button>
        </div>
      </div>

      <section id="mainPanel" class="panel active">
        <section class="card intro">
          <h1>
            와인을 누르면 상세정보를 확인하고 시음평을 바로 남길 수
            있어요.
          </h1>
          <p></p>
        </section>

        <section class="card section-card">
          <h2 class="section-title">Wine List</h2>
          <input
            id="search"
            class="search"
            placeholder="와인명, 산지, 품종으로 검색"
          />
          <div id="wineGrid" class="wine-grid"></div>
        </section>
      </section>

      <section id="blindPanel" class="panel">
        <section class="card intro">
          <h1>
            블라인드테이스팅은 정답 없이 관찰과 추측을 기록하는 방식으로
            구성했습니다.
          </h1>
          <p>
            Flight를 선택하고 안티노리 수입 포트폴리오 기준 드롭다운과
            메모를 이용해 참가자별 기록을 남길 수 있어요.
          </p>
        </section>

        <section class="card section-card blind-layout">
          <div>
            <div class="blind-header">
              <div>
                <h2 class="section-title" style="margin-bottom: 4px">
                  Blind Flights
                </h2>
                <div class="helper">
                  기존 Wine List와 별도로 운영됩니다.
                </div>
              </div>
            </div>
            <div id="blindList" class="blind-list"></div>
          </div>

          <div>
            <div class="blind-header">
              <div>
                <div
                  style="
                    display: flex;
                    gap: 8px;
                    flex-wrap: wrap;
                    align-items: center;
                    margin-bottom: 4px;
                  "
                >
                  <h2
                    id="blindSelected"
                    class="section-title"
                    style="margin: 0"
                  >
                    Flight 1
                  </h2>
                  <button
                    type="button"
                    id="editFlightOneBtn"
                    class="ghost-btn"
                    style="padding: 7px 10px; font-size: 11px"
                  >
                    Flight 1 이름 변경
                  </button>
                </div>
                <div class="helper">
                  참가자별 블라인드 기록을 현재 시트에 저장합니다.
                </div>
              </div>

              <div class="blind-stats">
                <div class="score-box">
                  <strong>Saved Flights</strong>
                  <span id="blindSolved">0</span>
                </div>
                <div class="score-box">
                  <strong>Latest Check</strong>
                  <span id="blindScore">0</span>
                </div>
              </div>
            </div>

            <div id="blindDetail"></div>
          </div>
        </section>
      </section>
    </div>

    <script>
      const CONFIG = {
        API_URL:
          "https://script.google.com/macros/s/AKfycbxzQgGrQCq4tD15IiOfhnKgZ6cihBgnaZwgrsep8VQwwhOE84iWo3bdXTqwQlK68hjJ/exec",
      };

      const wines = [
        {
          id: "conte-aymo",
          name: "마르케제 안티노리 콘테 아이모",
          eng: "Marchese Antinori Conte Aymo",
          vintage: "2020",
          region: "이탈리아 롬바르디아 프란차코르타",
          blend: "피노 누아(블랑 드 누아 스타일)",
          style: "전통 방식 스파클링",
          price: "행사용 리스트 기준",
          profile:
            "섬세한 기포, 브리오슈, 시트러스, 깔끔한 마감이 조화로운 스파클링입니다.",
          key: "첫 잔으로 입맛을 깨우며 이후 화이트와 레드의 흐름을 자연스럽게 여는 역할을 합니다.",
          expert: [
            {
              source: "공식 노트",
              score: "Franciacorta DOCG",
              text:
                "피노 누아 기반 블랑 드 누아로, 옅은 짚색과 매우 섬세한 버블을 보입니다. 레드 커런트와 라즈베리 같은 붉은 과실 향, 흰 꽃, 브리오슈와 효모 뉘앙스가 섞여 복합적인 아로마를 형성하고, 입 안에서는 크리미한 질감과 또렷한 산도, 미네랄이 균형을 이루며 길게 이어집니다.",
            },
            {
              source: "Vivino",
              score: "약 4.1 / 5",
              text:
                "사용자 평점은 4점대 초반으로, 스트로베리·라즈베리 계열의 붉은 과실, 레몬 껍질, 브리오슈, 구운 빵 뉘앙스를 언급하는 리뷰가 많습니다. 산도가 신선하고 버블이 세밀해, 단독으로도 좋지만 전채나 가벼운 요리와 곁들이기에 이상적인 프란차코르타로 인식됩니다.",
            },
            {
              source: "스타일 요약",
              score: "구조 중심 스파클링",
              text:
                "프랑스 샹파뉴보다 조금 더 따뜻한 산지 특성 덕분에 과실이 친절하게 느껴지면서도, 버블의 촘촘함과 산도·미네랄이 뼈대를 단단히 잡아 줍니다. 첫 잔에서 상큼한 과실과 크리미한 질감을 확인하고, 온도가 오르면서 효모와 브리오슈의 층이 어떻게 깊어지는지 보면서 마시면 좋습니다.",
            },
          ],
          tags: ["스파클링", "프란차코르타", "2020"],
        },
        {
          id: "cervaro",
          name: "체르바로",
          eng: "Cervaro della Sala",
          vintage: "2016 / 2024",
          region: "이탈리아 움브리아",
          blend: "샤르도네, 그레케토",
          style: "오크 숙성 프리미엄 화이트",
          price: "행사용 리스트 기준",
          profile:
            "버터, 헤이즐넛, 흰 꽃, 핵과실과 토스티한 결이 겹쳐지는 안티노리의 대표 화이트입니다.",
          key: "숙성 빈티지와 최신 빈티지의 질감, 산도, 풍미의 폭을 비교하기 좋습니다.",
          expert: [
            {
              source: "Robert Parker (Wine Advocate)",
              score: "RP 94–95 (최근 빈티지)",
              text:
                "최근 빈티지 체르바로는 샤르도네에 소량의 그레케토를 블렌딩하여, 잘 익은 핵과실과 시트러스, 아카시아 꽃, 섬세한 바닐라와 함께 헤이즐넛 버터, 브리오슈 같은 오크 뉘앙스를 보여줍니다. 2019·2020 빈티지는 특히 농도와 에너지가 모두 뛰어나며, 산도와 미네랄이 풍부한 질감을 수직적으로 지탱해 주는 구조를 가진다는 평가를 받습니다.[web:293][web:336][web:313]",
            },
            {
              source: "James Suckling",

      function escapeHtml(str = "") {
        return String(str).replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[ch]);
      }

      function formatDate(value) {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(
          2,
          "0"
        )}.${String(d.getDate()).padStart(2, "0")} ${String(
          d.getHours()
        ).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
      }

      function scoreOptionLabel(score) {
        const labels = {
          1: "Below Acceptable",
          2: "Acceptable",
          3: "Good",
          4: "Very Good",
          5: "Outstanding",
        };
        return labels[score] || String(score);
      }

      function getWineNotes(wineId) {
        return state.allNotes
          .filter((n) => n.wineId === wineId)
          .sort(
            (a, b) => new Date(b.timestamp) - new Date(a.timestamp)
          );
      }

      function getBlindNotes(flightId) {
        return state.blindNotes
          .filter((n) => n.flightId === flightId)
          .sort(
            (a, b) => new Date(b.timestamp) - new Date(a.timestamp)
          );
      }

      function getAverageScore(wineId) {
        const notes = getWineNotes(wineId).filter(
          (n) => !Number.isNaN(Number(n.score))
        );
        if (!notes.length) return null;
        return (
          notes.reduce(
            (sum, n) => sum + Number(n.score),
            0
          ) / notes.length
        ).toFixed(1);
      }

      function getBlindLabel(item) {
        return state.blindLabels[item.id] || item.code;
      }

                )}">${escapeHtml(option)}</option>`
            )
          )
          .join("");
      }

        return total;

          method: "POST",
          headers: {

          },
          body: body.toString(),
        });
        if (!res.ok) throw new Error("save");
        return res.text();

          <div class="chat-wrap">
            <div class="chat-top">
              <h4>참석자 시음평</h4>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                ${
                  avg
                    ? `<div class="avg-badge">
                         평균 ${avg} / 5 · ${getWineNotes(w.id).length}명
                       </div>`
                    : '<div class="avg-badge">아직 평점 없음</div>'
                }
                ${
                  status
                    ? `<div class="status-badge ${
                        status.includes("실패") ? "error" : ""
                      }">
                         ${escapeHtml(status)}
                       </div>`
                    : ""
                }
              </div>
            </div>

            <div class="chat-list">
              ${renderChatList(w.id)}
            </div>

            <form class="chat-form" data-wine-form="${w.id}">
              <div class="form-row">
                <select class="field" name="user" required>
                  <option value="">평가자</option>
                  <option value="허의지">허의지</option>
                  <option value="허의성">허의성</option>
                  <option value="박서이">박서이</option>
                </select>
              </div>

              <input type="hidden" name="score" value="" />

              <div class="rating-panel">
                ${[1, 2, 3, 4, 5]
                  .map(
                    (score) => `
                    <button
                      type="button"
                      class="rate-btn"
                      data-score="${score}"
                    >
                      ${scoreOptionLabel(score)}
                    </button>
                  `
                  )
                  .join("")}
              </div>

              <textarea
                class="textarea"
                name="text"
                placeholder="향, 산도, 질감, 여운, 음식 페어링 인상 등을 자유롭게 남겨보세요."
              ></textarea>

              <div class="chat-actions">
                <button type="submit" class="submit-btn">
                  저장
                </button>
                <div class="helper">
                  평가자와 평점을 선택한 뒤 저장해 주세요.
                </div>
              </div>
            </form>
          </div>
        `;
      }

      function renderWineList(filter = "") {
        wineGrid.innerHTML = "";

        const filtered = wines.filter((w) =>
          [w.name, w.eng, w.region, w.blend, ...(w.tags || [])]
            .join(" ")
            .toLowerCase()
            .includes(filter.toLowerCase())
        );

        if (!filtered.length) {
          wineGrid.innerHTML =
            '<div class="note">검색 결과가 없습니다.</div>';
          return;
        }

        filtered.forEach((wine, index) => {
          const wrap = document.createElement("div");
          wrap.className = "wine-card";

          const item = document.createElement("button");
          item.type = "button";
          item.className = "wine-item";
          item.innerHTML = `
            <h3>${wine.name}</h3>
            <p>${wine.eng}</p>
            <p>${wine.vintage} · ${wine.region}</p>
            <div class="chips">
              ${wine.tags
                .map((tag) => `<span class="chip">${tag}</span>`)
                .join("")}
            </div>
          `;

          const detail = document.createElement("div");
          detail.className = "detail-inline";
          detail.innerHTML = detailHTML(wine);

          item.addEventListener("click", () => {
            const alreadyOpen = detail.classList.contains("open");

            document
              .querySelectorAll(".wine-item")
              .forEach((el) => el.classList.remove("active"));
            document
              .querySelectorAll(".detail-inline")
              .forEach((el) => el.classList.remove("open"));

            if (alreadyOpen) {
              state.openedWineId = null;
              return;
            }

            item.classList.add("active");
            detail.classList.add("open");
            state.openedWineId = wine.id;

            bindWineFormEvents();
            bindDeleteButtons();
          });

          wrap.appendChild(item);
          wrap.appendChild(detail);
          wineGrid.appendChild(wrap);

          const shouldOpen =
            state.openedWineId === wine.id ||
            (!state.openedWineId && index === 0);

          if (shouldOpen) {
            item.classList.add("active");
            detail.classList.add("open");
            state.openedWineId = wine.id;
          }
        });

        bindWineFormEvents();
        bindDeleteButtons();
      }

      function bindWineFormEvents() {
        document
          .querySelectorAll("[data-wine-form]")
          .forEach((form) => {
            if (form.dataset.bound === "true") return;
            form.dataset.bound = "true";

            const hiddenScore = form.querySelector(
              'input[name="score"]'
            );

            form
              .querySelectorAll(".rate-btn")
              .forEach((btn) => {
                btn.addEventListener("click", () => {
                  form
                    .querySelectorAll(".rate-btn")
                    .forEach((el) =>
                      el.classList.remove("active")
                    );
                  btn.classList.add("active");
                  hiddenScore.value = btn.dataset.score;
                });
              });

            form.addEventListener("submit", async (e) => {
              e.preventDefault();
              const wineId = form.dataset.wineForm;
              const wine = wines.find((v) => v.id === wineId);

              const userName = form.user.value.trim();
              const score = form.score.value.trim();
              const comment = form.text.value.trim();

              if (!userName || !score || !comment) return;

              try {
                await saveNote({
                  wineId,
                                 await saveNote({
                  wineId,
                  userName,
                  score,
                  comment,
                });

                await fetchNotes();
                const detail = form.closest(".detail-inline");
                const wine = wines.find((w) => w.id === wineId);
                detail.innerHTML = detailHTML(
                  wine,
                  "저장 완료"
                );
                bindWineFormEvents();
                bindDeleteButtons();
              } catch (e) {
                const detail = form.closest(".detail-inline");
                const wine = wines.find((w) => w.id === wineId);
                detail.innerHTML = detailHTML(
                  wine,
                  "저장 실패, 다시 시도해주세요"
                );
                bindWineFormEvents();
                bindDeleteButtons();
              }
            });
          });
      }

      function bindDeleteButtons() {
        document
          .querySelectorAll("[data-delete-note]")
          .forEach((btn) => {
            if (btn.dataset.bound === "true") return;
            btn.dataset.bound = "true";

            btn.addEventListener("click", async () => {
              const [wineId, idxStr] =
                btn.dataset.deleteNote.split("|");
              const notes = getWineNotes(wineId);
              const idx = Number(idxStr);

              const target = notes[idx];
              if (!target) return;

              if (
                !confirm(
                  "이 시음평을 정말 삭제할까요? 되돌릴 수 없습니다."
                )
              ) {
                return;
              }

              try {
                await deleteNote({
                  wineId,
                  timestamp: target.timestamp,
                  userName: target.userName,
                });
                await fetchNotes();
                const detail = btn.closest(".detail-inline");
                const wine = wines.find((w) => w.id === wineId);
                detail.innerHTML = detailHTML(
                  wine,
                  "삭제 완료"
                );
                bindWineFormEvents();
                bindDeleteButtons();
              } catch (e) {
                alert("삭제 중 오류가 발생했습니다. 다시 시도해주세요.");
              }
            });
          });
      }

      function renderBlindList() {
        const list = document.getElementById("blindList");
        list.innerHTML = blindWines
          .map(
            (item) => `
            <button
              type="button"
              class="blind-item ${
                state.blindActiveId === item.id ? "active" : ""
              }"
              data-blind-id="${item.id}"
            >
              <h4>${escapeHtml(getBlindLabel(item))}</h4>
              <p>${escapeHtml(item.clue)}</p>
            </button>
          `
          )
          .join("");

        list
          .querySelectorAll("[data-blind-id]")
          .forEach((btn) => {
            btn.addEventListener("click", () => {
              const id = btn.dataset.blindId;
              state.blindActiveId = id;
              renderBlindList();
              renderBlindDetail();
            });
          });
      }

      function renderBlindDetail(status = "") {
        const container = document.getElementById("blindDetail");
        const item = blindWines.find(
          (b) => b.id === state.blindActiveId
        );
        if (!item) return;

        const notes = getBlindNotes(item.id);
        const latestScore =
          notes.length && notes[0].score
            ? Number(notes[0].score)
            : 0;
        state.latestBlindScore = latestScore;

        document.getElementById("blindSelected").textContent =
          getBlindLabel(item);
        document.getElementById(
          "blindSolved"
        ).textContent = String(state.blindSavedFlights.size);
        document.getElementById("blindScore").textContent =
          latestScore;

        container.innerHTML = `
          <div class="blind-box" style="margin-bottom:10px;">
            <div class="helper">
              ${escapeHtml(item.note || "")}
            </div>
          </div>

          <div class="chat-wrap">
            <div class="chat-top">
              <h4>블라인드 기록</h4>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <div class="avg-badge">
                  Saved Flights: ${
                    state.blindSavedFlights.size
                  }개
                </div>
                <div class="avg-badge">
                  Latest Check: ${latestScore}
                </div>
                ${
                  status
                    ? `<div class="status-badge ${
                        status.includes("실패") ? "error" : ""
                      }">${escapeHtml(status)}</div>`
                    : ""
                }
              </div>
            </div>

            <div class="chat-list">
              ${
                notes.length
                  ? notes
                      .map(
                        (n) => `
                    <div class="chat-item">
                      <div class="chat-meta">
                        <div>
                          <div class="chat-user">
                            ${escapeHtml(
                              n.userName || "Blind"
                            )}
                          </div>
                          <div class="chat-time">
                            ${escapeHtml(
                              formatDate(n.timestamp)
                            )}
                          </div>
                        </div>
                        <div class="chat-score">
                          점수: ${escapeHtml(String(n.score))}
                        </div>
                      </div>
                      <div class="chat-text">
                        ${escapeHtml(
                          String(n.comment || "").trim()
                        )}
                      </div>
                    </div>
                  `
                      )
                      .join("")
                  : `<div class="blind-empty">
                      아직 블라인드 기록이 없습니다.
                    </div>`
              }
            </div>

            <form class="blind-form" id="blindForm">
              <div class="form-row">
                <input
                  class="field"
                  name="user"
                  placeholder="기록자 이름 (예: 허의지)"
                />
              </div>

              <div class="form-row">
                <select
                  class="field"
                  name="producer"
                >
                  ${renderSelectOptions(
                    blindOptions.producers,
                    "예상 생산자"
                  )}
                </select>
                <select
                  class="field"
                  name="country"
                >
                  ${renderSelectOptions(
                    blindOptions.countries,
                    "예상 국가"
                  )}
                </select>
              </div>

              <div class="form-row">
                <select
                  class="field"
                  name="region"
                >
                  ${renderSelectOptions(
                    blindOptions.regions,
                    "예상 산지"
                  )}
                </select>
                <select
                  class="field"
                  name="variety"
                >
                  ${renderSelectOptions(
                    blindOptions.varieties,
                    "예상 품종/스타일"
                  )}
                </select>
              </div>

              <div class="form-row">
                <input
                  class="field"
                  name="wine"
                  placeholder="예상 와인명 (선택)"
                />
                <input
                  class="field"
                  name="vintage"
                  placeholder="예상 빈티지 (선택)"
                />
              </div>

              <textarea
                class="textarea"
                name="text"
                placeholder="색, 향, 구조, 추측 등을 자유롭게 기록해보세요."
              ></textarea>

              <div class="blind-actions">
                <button type="submit" class="submit-btn">
                  기록 저장
                </button>
                <div class="helper">
                  예상 정보를 많이 적을수록 점수가 올라갑니다.
                </div>
              </div>
            </form>
          </div>
        `;

        bindBlindForm();
      }

      function bindBlindForm() {
        const form = document.getElementById("blindForm");
        if (!form || form.dataset.bound === "true") return;
        form.dataset.bound = "true";

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const flightId = state.blindActiveId;
          const userName = form.user.value.trim();
          const comment = form.text.value.trim();

          const payload = {
            flightId,
            userName,
            producer: form.producer.value,
            wineName: form.wine.value,
            country: form.country.value,
            region: form.region.value,
            variety: form.variety.value,
            vintage: form.vintage.value,
            comment,
          };

          const blindScore = scoreBlindGuess(form);
          payload.score = String(blindScore);

          try {
            await saveBlindNote(payload);
            await fetchBlindNotes();
            state.blindSavedFlights.add(flightId);
            renderBlindDetail("블라인드 기록 저장 완료");
          } catch (e2) {
            renderBlindDetail("저장 실패, 다시 시도해주세요");
          }
        });
      }

      function initTabs() {
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => {
            btn.addEventListener("click", () => {
              const target =
                btn.dataset.tabTarget || "mainPanel";
              document
                .querySelectorAll(".tab-btn")
                .forEach((b) =>
                  b.classList.remove("active")
                );
              btn.classList.add("active");

              document
                .querySelectorAll(".panel")
                .forEach((p) => p.classList.remove("active"));
              document
                .getElementById(target)
                .classList.add("active");
            });
          });
      }

      function initTheme() {
        const saved =
          window.localStorage.getItem("wine-theme") || "light";
        document.documentElement.dataset.theme = saved;
        themeBtn.textContent =
          saved === "dark" ? "라이트모드" : "다크모드";

        themeBtn.addEventListener("click", () => {
          const current =
            document.documentElement.dataset.theme || "light";
          const next = current === "light" ? "dark" : "light";
          document.documentElement.dataset.theme = next;
          window.localStorage.setItem("wine-theme", next);
          themeBtn.textContent =
            next === "dark" ? "라이트모드" : "다크모드";
        });
      }

      function initSearch() {
        searchInput.addEventListener("input", () => {
          renderWineList(searchInput.value.trim());
        });
      }

      async function init() {
        try {
          await Promise.all([fetchNotes(), fetchBlindNotes()]);
        } catch (e) {
          console.warn("초기 데이터 로딩 실패", e);
        }

        renderWineList("");
        renderBlindList();
        renderBlindDetail();
        initTabs();
        initTheme();
        initSearch();

        const editFlightOneBtn =
          document.getElementById("editFlightOneBtn");
        if (editFlightOneBtn) {
          editFlightOneBtn.addEventListener("click", () => {
            const currentLabel =
              state.blindLabels["blind-1"] || "Flight 1";
            const next = window.prompt(
              "Flight 1 이름을 입력하세요.",
              currentLabel
            );
            if (!next) return;
            state.blindLabels["blind-1"] = next;
            renderBlindList();
            renderBlindDetail();
          });
        }
      }

      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
