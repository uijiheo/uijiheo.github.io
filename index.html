<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>안티노리 First Class 대시보드</title>
    <!-- version: 2026-04-29 uihee clean-with-dropdown-1 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f1eb;
        --surface: #fffdfa;
        --surface-2: #efe8df;
        --line: #ded4c7;
        --text: #211b15;
        --muted: #6f665c;
        --accent: #7a2e38;
        --chip: #f1e7da;
        --good: #6b4a2f;
        --danger: #a33b3b;
        --radius: 14px;
        --shadow: 0 10px 26px rgba(44, 32, 22, 0.06);
      }

      [data-theme="dark"] {
        --bg: #151210;
        --surface: #211b17;
        --surface-2: #2a231e;
        --line: #3f352d;
        --text: #f3ece4;
        --muted: #b8ab9e;
        --accent: #c48a92;
        --chip: #302822;
        --good: #b99674;
        --danger: #de8f8f;
        --shadow: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans KR", sans-serif;
        background: linear-gradient(180deg, var(--bg), var(--surface-2));
        color: var(--text);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 10px;
      }

      .toolbar {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .toolbar-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .page-badge {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        padding: 7px 10px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: calc(100% - 96px);
      }

      .theme-btn,
      .tab-btn,
      .ghost-btn,
      .submit-btn {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        padding: 9px 12px;
        border-radius: 999px;
      }

      .theme-btn {
        min-width: 84px;
        padding: 8px 10px;
        font-size: 12px;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .tab-btn {
        text-align: center;
        font-size: 13px;
      }

      .tab-btn.active {
        background: #7a2e38;
        color: #fff;
        border-color: transparent;
      }

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
      }

      .card {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      [data-theme="dark"] .card {
        background: rgba(33, 27, 23, 0.94);
      }

      .intro {
        padding: 14px;
        margin-bottom: 10px;
      }

      .intro h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.45;
      }

      .intro p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .section-card {
        padding: 12px;
        margin-bottom: 10px;
      }

      .section-title {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .search {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
        margin-bottom: 10px;
      }

      .wine-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .wine-card {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .wine-item {
        width: 100%;
        text-align: left;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
      }

      .wine-item.active {
        border-color: #7a2e38;
        box-shadow: 0 6px 16px rgba(80, 40, 20, 0.06);
      }

      .wine-item h3 {
        margin: 0 0 3px;
        font-size: 14px;
        color: #7a2e38 !important;
      }

      .wine-item p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .chips {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .chip {
        display: inline-flex;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 10px;
        color: #7a2e38 !important;
      }

      .chip-critic {
        background: rgba(108, 92, 231, 0.12);
        color: #3e2f7f;
        font-weight: 600;
      }

      .detail-inline {
        display: none;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
      }

      .detail-inline.open {
        display: block;
      }

      .headline {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 8px;
        flex-direction: column;
      }

      .headline h3 {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
      }

      .sub {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .vintage {
        padding: 5px 9px;
        border-radius: 999px;
        background: var(--chip);
        font-size: 11px;
        white-space: nowrap;
      }

      .section {
        margin-top: 10px;
      }

      .section h4 {
        margin: 0 0 6px;
        font-size: 13px;
        color: #7a2e38;
      }

      .kv {
        display: grid;
        grid-template-columns: 78px 1fr;
        gap: 4px 10px;
        font-size: 12px;
      }

      .kv div {
        padding: 6px 0;
        border-bottom: 1px solid var(--line);
      }

      .k {
        color: var(--muted);
      }

      .note,
      .quote,
      .chat-wrap,
      .blind-box,
      .score-box {
        padding: 10px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .quote {
        margin-bottom: 8px;
      }

      .quote strong {
        display: block;
        font-size: 12px;
        margin-bottom: 3px;
      }

      .quote p,
      .note {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      .chat-wrap {
        margin-top: 10px;
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .chat-header strong {
        font-size: 13px;
      }

      .score-badge {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(122, 46, 56, 0.08);
      }

      .chat-form {
        display: grid;
        gap: 8px;
      }

      .form-row {
        display: grid;
        gap: 6px;
      }

      .field,
      .textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 8px 10px;
        background: var(--surface);
        color: var(--text);
        font-size: 12px;
      }

      .textarea {
        min-height: 80px;
        resize: vertical;
      }

      .chat-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .submit-btn {
        padding-inline: 16px;
        font-size: 12px;
        background: #7a2e38;
        color: #fff;
        border-color: transparent;
      }

      .helper {
        font-size: 11px;
        color: var(--muted);
      }

      .chat-log {
        margin-top: 10px;
        display: grid;
        gap: 6px;
        max-height: 220px;
        overflow-y: auto;
      }

      .chat-item {
        padding: 8px 9px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface);
        font-size: 11px;
      }

      .chat-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;
        margin-bottom: 4px;
      }

      .chat-meta strong {
        font-size: 11px;
      }

      .chat-meta span {
        font-size: 10px;
        color: var(--muted);
      }

      .chat-text {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .chat-footer {
        margin-top: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10px;
        color: var(--muted);
      }

      .delete-btn {
        border: none;
        background: transparent;
        color: var(--danger);
        font-size: 10px;
        padding: 2px 4px;
      }

      .blind-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .blind-box {
        display: grid;
        gap: 6px;
      }

      .blind-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .blind-label {
        font-size: 13px;
        font-weight: 600;
      }

      .blind-clue {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .blind-form {
        display: grid;
        gap: 6px;
      }

      .blind-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .blind-form .field {
        font-size: 11px;
        padding: 7px 10px;
      }

      .score-box {
        margin-top: 8px;
        display: grid;
        gap: 4px;
        font-size: 11px;
      }

      .score-main {
        font-weight: 600;
      }

      .score-sub {
        color: var(--muted);
      }

      .blind-log {
        margin-top: 6px;
        display: grid;
        gap: 5px;
      }

      .blind-item {
        padding: 6px 8px;
        border-radius: 10px;
        border: 1px dashed var(--line);
        font-size: 11px;
      }

      .blind-item strong {
        font-size: 11px;
      }

      .blind-item span {
        font-size: 10px;
        color: var(--muted);
      }

      .note + .note {
        margin-top: 6px;
      }

      .ghost-btn {
        font-size: 11px;
        padding-block: 6px;
      }

      @media (min-width: 720px) {
        .headline {
          flex-direction: row;
          align-items: center;
        }

        .intro {
          padding: 16px;
        }

        .section-card {
          padding: 14px;
        }
      }
    </style>
  </head>

          placeholder="와인명, 산지, 품종으로 검색"

      <div class="card section-card panel" data-panel="blind">
        <h2 class="section-title">Blind Tasting Notes</h2>

          price: "행사 리스트 기준",
          profile:
            "카베르네 소비뇽과 카르메네르를 중심으로 한 Maipo Andes의 대표 아이콘 블렌드입니다.",
          key:
            "나파와 토스카나의 보르도 블렌드와 비교해 칠레 특유의 허브·그래파이트·스파이스 축을 느껴보기 좋은 와인입니다.",
          expert: [],
          tags: ["레드", "칠레", "Cabernet · Carmenère"],
        },
        {
          id: "haras-pitio",
          name: "Haras de Pirque Pitío",
          nameKo: "하라스 피티오",
          eng: "Haras de Pirque Pitío",
          vintage: "2023",
          region: "칠레 Maipo",
          blend: "레드 블렌드",
          style: "Maipo High 구조형 레드",
          price: "행사용 리스트 기준",
          profile:
            "붉은 과실, 허브, 산뜻한 질감과 접근성 좋은 구조를 보여주는 보다 경쾌한 스타일입니다.",
          key:
            "Albis와 함께 두고 Maipo Andes 블렌드의 방향성과 구조를 비교해 볼 수 있는 와인입니다.",
          expert: [],
          tags: ["레드", "칠레", "2023"],
        },
      ];
            const blindWines = [
        { id: "blind-1", code: "Flight 1", clue: "색, 향, 산도, 바디, 탄닌, 오크 여부를 중심으로 관찰해보세요.", note: "" },
        { id: "blind-2", code: "Flight 2", clue: "첫 향과 시간이 지난 뒤 향의 변화를 비교해보세요.", note: "" },
        { id: "blind-3", code: "Flight 3", clue: "당도 느낌, 산도, 알코올, 질감의 균형을 체크해보세요.", note: "" },
      ];

      const blindOptions = {
        producers: ["Antinori", "Stag's Leap Wine Cellars", "Haras de Pirque"],
        countries: ["Italy", "USA", "Chile"],
        regions: ["Toscana", "Bolgheri", "Napa Valley", "Maipo"],
        varieties: ["Sangiovese", "Cabernet Sauvignon", "Cabernet Franc", "Carmenere", "Blend / Cuvée"],
      };

      const state = {
        allNotes: [],
        blindNotes: [],
        openedWineId: null,
        blindSavedFlights: new Set(),
        latestBlindScore: 0,
        blindLabels: { "blind-1": "Flight 1" },
      };

      const wineGrid = document.getElementById("wineGrid");
      const blindGrid = document.getElementById("blindGrid");
      const searchInput = document.getElementById("search");
      const themeBtn = document.getElementById("themeBtn");

      function escapeHtml(str = "") {
        return String(str).replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[ch]);
      }

      function formatDate(value) {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(
          2,
          "0"
        )}.${String(d.getDate()).padStart(2, "0")} ${String(
          d.getHours()
        ).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
      }

      function getWineNotes(wineId) {
        return state.allNotes
          .filter((n) => n.wineId === wineId)
          .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      }

      function getBlindNotes(flightId) {
        return state.blindNotes
          .filter((n) => n.flightId === flightId)
          .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      }

      function getCriticAverage(wine) {
        if (!wine || !Array.isArray(wine.expert)) return null;
        const scores = [];
        wine.expert.forEach((item) => {
          if (!item || typeof item.score !== "string") return;
          const matches = item.score.match(/\d+/g);
          if (!matches) return;
          matches.forEach((m) => {
            const num = Number(m);
            if (!Number.isNaN(num)) scores.push(num);
          });
        });
        if (!scores.length) return null;
        const avg = scores.reduce((s, v) => s + v, 0) / scores.length;
        return avg.toFixed(1);
      }

      function getBlindLabel(item) {
        return state.blindLabels[item.id] || item.code;
      }

      function renderSelectOptions(options, placeholder) {
        return [`<option value="">${placeholder}</option>`]
          .concat(
            options.map(
              (option) =>
                `<option value="${escapeHtml(option)}">${escapeHtml(
                  option
                )}</option>`
            )
          )
          .join("");
      }

      async function fetchNotes() {
        const res = await fetch(CONFIG.API_URL);
        if (!res.ok) throw new Error("notes");
        const data = await res.json();
        state.allNotes = Array.isArray(data) ? data : [];
      }

      async function fetchBlindNotes() {
        const res = await fetch(`${CONFIG.API_URL}?action=listBlind`);
        if (!res.ok) throw new Error("blind");
        const data = await res.json();
        state.blindNotes = Array.isArray(data) ? data : [];
        state.blindSavedFlights = new Set(
          state.blindNotes.map((n) => n.flightId).filter(Boolean)
        );
      }

      async function saveNote(payload) {
        const body = new URLSearchParams(payload);
        const res = await fetch(CONFIG.API_URL, {
          method: "POST",
          headers: {
            "Content-Type":
              "application/x-www-form-urlencoded;charset=UTF-8",
          },
          body: body.toString(),
        });
        if (!res.ok) throw new Error("save");
        return res.text();
      }

      async function deleteNote(payload) {
        const body = new URLSearchParams({ action: "delete", ...payload });
        const res = await fetch(CONFIG.API_URL, {
          method: "POST",
          headers: {
            "Content-Type":
              "application/x-www-form-urlencoded;charset=UTF-8",
          },
          body: body.toString(),
        });
        if (!res.ok) throw new Error("delete");
        return res.text();
      }

      async function saveBlindNote(payload) {
        const body = new URLSearchParams({ action: "saveBlind", ...payload });
        const res = await fetch(CONFIG.API_URL, {
          method: "POST",
          headers: {
            "Content-Type":
              "application/x-www-form-urlencoded;charset=UTF-8",
          },
          body: body.toString(),
        });
        if (!res.ok) throw new Error("saveBlind");
        return res.text();
      }

      function detailHTML(wine, message = "") {
        const notes = getWineNotes(wine.id);

        return `
          <div class="headline">
            <div>
              <h3>${escapeHtml(wine.nameKo || wine.name)}</h3>
              <div class="sub">
                ${escapeHtml(wine.eng || "")}
              </div>
            </div>
            <div class="vintage">
              ${escapeHtml(wine.vintage || "")}
            </div>
          </div>

          <div class="section">
            <div class="kv">
              <div class="k">지역</div>
              <div>${escapeHtml(wine.region || "")}</div>
              <div class="k">블렌드</div>
              <div>${escapeHtml(wine.blend || "")}</div>
              <div class="k">스타일</div>
              <div>${escapeHtml(wine.style || "")}</div>
              <div class="k">비고</div>
              <div>${escapeHtml(wine.price || "")}</div>
            </div>
          </div>

          <div class="section">
            <h4>테이스팅 포인트</h4>
            <div class="quote">
              <strong>프로필</strong>
              <p>${escapeHtml(wine.profile || "")}</p>
            </div>
            <div class="note">
              ${escapeHtml(wine.key || "")}
            </div>
          </div>

          <div class="section">
            <h4>전문가 & 참고 노트</h4>
            ${
              (wine.expert || [])
                .map(
                  (e) => `
                  <div class="quote">
                    <strong>${escapeHtml(e.source || "")} · ${
                    e.score ? escapeHtml(e.score) : "-"
                  }</strong>
                    <p>${escapeHtml(e.text || "")}</p>
                  </div>
                `
                )
                .join("") || '<div class="note">등록된 노트가 없습니다.</div>'
            }
          </div>

          <div class="section">
            <div class="chat-wrap">
              <div class="chat-header">
                <strong>시음 메모</strong>
              </div>

              <form class="chat-form" data-wine-form="${
                wine.id
              }">
                <div class="form-row">
                  <select class="field" name="user" required>
                    <option value="">평가자</option>
                    <option value="허의지">허의지</option>
                    <option value="허의성">허의성</option>
                    <option value="박서이">박서이</option>
                  </select>
                </div>

                <div class="form-row">
              <select class="field" name="score" required>
  <option value="">평점 선택</option>
  <option value="Below Acceptable">1점 · Below Acceptable</option>
  <option value="Acceptable">2점 · Acceptable</option>
  <option value="Good">3점 · Good</option>
  <option value="Very Good">4점 · Very Good</option>
  <option value="Outstanding">5점 · Outstanding</option>
</select>
                </div>

                <textarea
                  class="textarea"
                  name="text"
                  placeholder="향, 산도, 질감, 여운, 음식 페어링 인상 등을 자유롭게 남겨보세요."
                ></textarea>

                <div class="chat-actions">
                  <button type="submit" class="submit-btn">
                    저장
                  </button>
                  <div class="helper">
                    평가자와 평점을 선택한 뒤 저장해 주세요.
                  </div>
                </div>
              </form>

              <div class="chat-log">
                ${
                  notes.length
                    ? notes
                        .map(
                          (n) => `
                    <div class="chat-item">
                      <div class="chat-meta">
                        <strong>${escapeHtml(n.userName || "")}</strong>
                        <span>${formatDate(n.timestamp)}</span>
                      </div>
                      <p class="chat-text">${escapeHtml(
                        n.comment || ""
                      )}</p>
                      <div class="chat-footer">
                        <span>${escapeHtml(n.score || "")}</span>
                        <button
                          type="button"
                          class="delete-btn"
                          data-delete-id="${escapeHtml(
                            n.id || ""
                          )}"
                        >
                          삭제
                        </button>
                      </div>
                    </div>
                  `
                        )
                        .join("")
                    : '<div class="note">아직 등록된 시음 메모가 없습니다.</div>'
                }
              </div>

              ${
                message
                  ? `<div class="note" style="margin-top:8px;">${escapeHtml(
                      message
                    )}</div>`
                  : ""
              }
            </div>
          </div>
        `;
      }

      function renderWineList(filter = "") {
        wineGrid.innerHTML = "";

        const filtered = wines.filter((w) =>
          [w.name, w.eng, w.region, w.blend, ...(w.tags || [])]
            .join(" ")
            .toLowerCase()
            .includes(filter.toLowerCase())
        );

        if (!filtered.length) {
          wineGrid.innerHTML =
            '<div class="note">검색 결과가 없습니다.</div>';
          return;
        }

        filtered.forEach((wine, index) => {
          const criticAvg = getCriticAverage(wine);

          const wrap = document.createElement("div");
          wrap.className = "wine-card";

          const item = document.createElement("button");
          item.className = "wine-item";
          item.type = "button";
          item.innerHTML = `
            <h3>${wine.name}</h3>
            <p>${wine.eng}</p>
            <p>${wine.vintage} · ${wine.region}</p>
            <div class="chips">
              ${
                criticAvg
                  ? `<span class="chip chip-critic">Critics ${criticAvg}</span>`
                  : ""
              }
              ${
                wine.tags
                  .map((tag) => `<span class="chip">${tag}</span>`)
                  .join("")
              }
            </div>
          `;

          const detail = document.createElement("div");
          detail.className = "detail-inline";
          detail.innerHTML = detailHTML(wine);

          item.addEventListener("click", () => {
            const alreadyOpen = detail.classList.contains("open");

            document
              .querySelectorAll(".wine-item")
              .forEach((el) => el.classList.remove("active"));
            document
              .querySelectorAll(".detail-inline")
              .forEach((el) => el.classList.remove("open"));

            if (alreadyOpen) {
              state.openedWineId = null;
              return;
            }

            item.classList.add("active");
            detail.classList.add("open");
            state.openedWineId = wine.id;

            bindWineFormEvents();
            bindDeleteButtons();
          });

          wrap.appendChild(item);
          wrap.appendChild(detail);
          wineGrid.appendChild(wrap);

          const shouldOpen =
            state.openedWineId === wine.id ||
            (!state.openedWineId && index === 0);

          if (shouldOpen) {
            item.classList.add("active");
            detail.classList.add("open");
            state.openedWineId = wine.id;
          }
        });

        bindWineFormEvents();
        bindDeleteButtons();
      }

      function bindWineFormEvents() {
        document
          .querySelectorAll("[data-wine-form]")
          .forEach((form) => {
            if (form.dataset.bound === "true") return;
            form.dataset.bound = "true";

            form.addEventListener("submit", async (e) => {
              e.preventDefault();
              const wineId = form.dataset.wineForm;

              const userName = form.user.value.trim();
              const score = form.score.value.trim();
              const comment = form.text.value.trim();

              if (!userName || !score || !comment) return;

              try {
                await saveNote({
                  wineId,
                  userName,
                  score,
                  comment,
                });

                await fetchNotes();
                const detail = form.closest(".detail-inline");
                const wine = wines.find((w) => w.id === wineId);
                detail.innerHTML = detailHTML(
                  wine,
                  "저장 완료"
                );
                bindWineFormEvents();
                bindDeleteButtons();
              } catch (e) {
                const detail = form.closest(".detail-inline");
                const wine = wines.find((w) => w.id === wineId);
                detail.innerHTML = detailHTML(
                  wine,
                  "저장 실패, 다시 시도해주세요"
                );
                bindWineFormEvents();
                bindDeleteButtons();
              }
            });
          });
      }

      function bindDeleteButtons() {
        document
          .querySelectorAll("[data-delete-id]")
          .forEach((btn) => {
            if (btn.dataset.bound === "true") return;
            btn.dataset.bound = "true";

            btn.addEventListener("click", async () => {
              const id = btn.dataset.deleteId;
              if (!id) return;
              if (!window.confirm("이 메모를 삭제할까요?")) return;

              try {
                await deleteNote({ id });
                await fetchNotes();
                renderWineList(searchInput.value || "");
              } catch (e) {
                alert("삭제 실패, 다시 시도해주세요.");
              }
            });
          });
      }

      function renderBlindGrid() {
        blindGrid.innerHTML = "";

        blindWines.forEach((item) => {
          const notes = getBlindNotes(item.id);
          const saved = state.blindSavedFlights.has(item.id);

          const box = document.createElement("div");
          box.className = "blind-box";

          box.innerHTML = `
            <div class="blind-header">
              <div>
                <div class="blind-label">${getBlindLabel(item)}</div>
                <p class="blind-clue">${escapeHtml(
                  item.clue || ""
                )}</p>
              </div>
              ${
                saved
                  ? '<span class="score-badge">기록 있음</span>'
                  : ""
              }
            </div>

            <form class="blind-form" data-blind-form="${item.id}">
              <div class="blind-row">
                <select class="field" name="producer">
                  ${renderSelectOptions(
                    blindOptions.producers,
                    "생산자 (옵션)"
                  )}
                </select>
                <input
                  class="field"
                  name="wine"
                  placeholder="와인명 / 큐베 (옵션)"
                />
              </div>
              <div class="blind-row">
                <select class="field" name="country">
                  ${renderSelectOptions(
                    blindOptions.countries,
                    "국가 (옵션)"
                  )}
                </select>
                <select class="field" name="region">
                  ${renderSelectOptions(
                    blindOptions.regions,
                    "지역 (옵션)"
                  )}
                </select>
              </div>
              <div class="blind-row">
                <select class="field" name="variety">
                  ${renderSelectOptions(
                    blindOptions.varieties,
                    "품종/스타일 (옵션)"
                  )}
                </select>
                <input
                  class="field"
                  name="vintage"
                  placeholder="빈티지 / 연도 (옵션)"
                />
              </div>
              <textarea
                class="textarea"
                name="text"
                placeholder="향, 구조, 스타일 인상을 자유롭게 적어보세요."
              ></textarea>
              <div class="chat-actions">
                <button type="submit" class="submit-btn">
                  기록 저장
                </button>
                <div class="helper">
                  정답보다 관찰 중심으로 적어도 충분합니다.
                </div>
              </div>
            </form>

            <div class="score-box">
              <div class="score-main">
                최근 시도 점수: ${
                  state.latestBlindScore
                    ? `${state.latestBlindScore} / 6`
                    : "아직 없음"
                }
              </div>
              <div class="score-sub">
                생산자 / 와인 / 국가 / 지역 / 품종 / 빈티지
                각 1점씩, 최대 6점입니다.
              </div>
            </div>

            <div class="blind-log">
              ${
                notes.length
                  ? notes
                      .map(
                        (n) => `
                  <div class="blind-item">
                    <strong>${escapeHtml(
                      n.userName || ""
                    )}</strong>
                    <span> · ${formatDate(
                      n.timestamp
                    )}</span>
                    <p class="chat-text">${escapeHtml(
                      n.comment || ""
                    )}</p>
                    <div class="chat-footer">
                      <span>Score: ${escapeHtml(
                        n.score || ""
                      )} / 6</span>
                    </div>
                  </div>
                `
                      )
                      .join("")
                  : '<div class="note">아직 기록된 Blind 노트가 없습니다.</div>'
              }
            </div>
          `;

          blindGrid.appendChild(box);
        });

        bindBlindFormEvents();
      }

      function scoreBlindGuess(form) {
        let total = 0;
        ["producer", "wine", "country", "region", "variety", "vintage"].forEach(
          (name) => {
            if (form[name] && String(form[name].value).trim()) {
              total += 1;
            }
          }
        );
        return total;
      }

      function bindBlindFormEvents() {
        document
          .querySelectorAll("[data-blind-form]")
          .forEach((form) => {
            if (form.dataset.bound === "true") return;
            form.dataset.bound = "true";

            form.addEventListener("submit", async (e) => {
              e.preventDefault();
              const flightId = form.dataset.blindForm;

              const payload = {
                flightId,
                userName: "Blind",
                producer: form.producer.value.trim(),
                wine: form.wine.value.trim(),
                country: form.country.value.trim(),
                region: form.region.value.trim(),
                variety: form.variety.value.trim(),
                vintage: form.vintage.value.trim(),
                comment: form.text.value.trim(),
              };

              if (!payload.comment) return;

              const score = scoreBlindGuess(form);
              state.latestBlindScore = score;

              try {
                await saveBlindNote({
                  ...payload,
                  score,
                });
                await fetchBlindNotes();
                renderBlindGrid();
              } catch (e) {
                alert("Blind 노트 저장 실패, 다시 시도해주세요.");
              }
            });
          });
      }

      function initTheme() {
        const saved =
          window.localStorage.getItem("wine-theme") || "light";
        document.documentElement.dataset.theme = saved;
        themeBtn.textContent =
          saved === "dark" ? "라이트 모드" : "다크 모드";

        themeBtn.addEventListener("click", () => {
          const next =
            document.documentElement.dataset.theme === "dark"
              ? "light"
              : "dark";
          document.documentElement.dataset.theme = next;
          themeBtn.textContent =
            next === "dark" ? "라이트 모드" : "다크 모드";
          window.localStorage.setItem("wine-theme", next);
        });
      }

      function initTabs() {
        const tabs = document.querySelectorAll(".tab-btn");
        const panels = document.querySelectorAll(".panel");

        tabs.forEach((tab) => {
          tab.addEventListener("click", () => {
            const target = tab.dataset.tab;
            tabs.forEach((t) => t.classList.remove("active"));
            panels.forEach((p) => p.classList.remove("active"));
            tab.classList.add("active");
            document
              .querySelector(`[data-panel="${target}"]`)
              .classList.add("active");
          });
        });
      }

      async function init() {
        initTheme();
        initTabs();

        try {
          await Promise.all([fetchNotes(), fetchBlindNotes()]);
        } catch (e) {
          console.error(e);
        }

        renderWineList();
        renderBlindGrid();

        searchInput.addEventListener("input", () => {
          renderWineList(searchInput.value || "");
        });
      }

      init();
    </script>
  </body>
</html>
